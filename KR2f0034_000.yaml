body:
  text: 張襄壯奏疏詔令奏議類二奏議之屬提要臣等謹案張襄壯奏疏六卷國朝張勇撰勇字飛熊上元人積軍功官至靖逆侯靖逆將軍提督甘肅軍務加少傅兼太子太師是集為其子雲翼所編始於順治六年謝實授甘肅總兵官疏終於康熙二十三年甘州遺疏凡百二十篇勇初任甘肅總兵官時即內值肅州回民作亂外值昻漢夷人窺邊日事攻討中間奉調南征旋回甘肅復值王輔臣之亂往來征𠞰日無寧晷其沒也猶以防禦麥力幹之故力疾出師卒於軍營計始終兵間四十餘年王進寶趙良棟等皆由其偏禆起為名將自康熙十三年以後箭創病足以肩輿督師者十年屢乞解職皆荷優詔慰留卧理蓋兩朝受知之深諸將無逾於勇者今觀集中諸疏大抵皆兵間所作並剴切詳明言無不盡讀之可見開國之初底定秦隴之方略並可見列聖知人善任風雲際㑹極千載一時之盛焉乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:15027067b113daf9297e211dbd60243fd380f6e427449465658b4cab02e7dd45
