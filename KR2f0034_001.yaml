body:
  text: 張襄壯奏疏巻一甘肅提督靖逆侯張勇撰鎮守甘肅等處地方總兵官都督僉事臣張勇謹奏為恭謝天恩事順治六年十一月十二日臣在肅州征勦􅉰逆行間接閲邸報䝉兵部題覆陜督孟喬芳㑹題為巖疆亟需總鎮等事奉旨張勇著以都督僉事充總兵官鎮守陜西甘肅等處地方勑印即與頒給欽此隨䝉禮部頒給順字第八十五號鎮守甘肅總兵官銀印一顆又兵部給發甘肅總兵官劄付一道各到臣該臣即恭設香案望闕叩頭謝恩祇領訖伏念臣以介胄武夫遭逢聖世猥䝉不棄謭劣俾得効命疆場用圖尺寸仰答髙深顧戡定亂畧冒險衝鋒計出萬死一生莫非臣之職分乃荷皇上格外優擢實除今職自是權益重而臣之憂益殷恩愈深而臣之感愈切當兹拜命惶悚難安祇懼隕越有辜帝簡然臣自任軍旅以來即矢致身之義况今特膺寵畀自當更竭報私寒霜卧甲敢懷楊栁之詩夜月横戈豈有玉闗之望惟期努力報我聖朝為此理合具疏奏謝伏乞皇上睿鑒施行順治六年十二月十三日奏奉旨知道了該部知道附陜西總督孟喬芳原題疏題為巖疆亟需總鎮煩請題補實銜以振軍威以重彈壓事准巡撫甘肅右副都御史周文闕咨前事内稱甘肅逺在邊徼番彛比隣又前叛􅉰作亂地方殘破今甘凉等處雖已恢復而肅城賊孽猶盤踞未下况貴部院因延寧告警分兵東向而攻圍之事毫難疎懈竊慮此時此地非有實銜總鎮則法令行威恐無以懾將士之心資彈壓之重也其署鎮張勇功績甚多自任事以來召募壯健以練營伍製造器械以壯軍實屢戰屢㨗斬馘梟逆且其馭兵恤衆咸得厥心防邊固圉動合機宜誠今日五郡之干城也若但以署事任之而坐待後來之實授恐無以厭人望而貽悮于封疆等因移咨到臣該臣看得甘肅一鎮孤懸河西兼與哈宻為隣番彛雜處夙稱極邊要地也且自闖賊蹂躪之後又值逆􅉰叛變士馬消耗人民死徙凋殘之狀大有不堪全賴撫鎮二臣從新整理極力招徠庻幾望有起色今撫臣周文闕老成持重已稱得人惟是總鎮缺員雖准部咨委用張勇然係署事之官人心未免玩視且肅城􅉰孽尚在盤踞又值延寧告警臣不得不分兵兼顧雖留有臣標中軍馬寧等兵四千并續調臨鎮之兵赴彼協力圍勦務期蕩滅但彈壓兵民撫禦番彛非得實授總兵未足以懾服其心也况張勇有謀能戰屢建竒績且自署事以來破賊復城練兵飭伍製造器甲壁壘為之一新又恤民撫番無不愛戴是以撫臣有移請實授之議良以封疆起見實非阿私所好也查張勇履歴功次臣先已造册咨送樞部訖臣謹㑹同撫臣周文闕按臣石維崑合詞具題伏乞皇上睿鑒勑部察議如果臣等所言不謬將張勇准即實授甘肅總兵仍速頒賜勑印則巖疆幸甚臣等幸甚謹題請旨順治六年五月初四日題奉旨張勇著以都督僉事充總兵官鎮守甘肅等處地方勑印即與頒給鎮守甘肅等處地方總兵官都督僉事臣張勇謹題為飛報生擒逆首恢復肅州併陳善後事宜事竊河西自􅉰逆倡亂以來人心惶惑所在城堡𩔖皆淪陷致厪廟堂西顧已逾年矣凢受封疆之寄者孰不思滅此而後朝食以期毋負責成至意先是督臣孟喬芳提臣傅夸蟾奉命調遣滿漢官兵追殺米丁二逆於鞏昌城下大破之米喇印時即授首獨丁國棟猶奔踞肅州為負嵎之計節經塘報在案續督提二臣平凉定甘之後親抵肅州嘉峪闗等處正在分佈營壘指授方畧尅期進勦間適大同姜逆叛變督臣同提臣遂統師赴晉唯留督標中軍副將馬寧帶領馬步官兵四千員名駐劄肅地與臣計議攻圍於六年十一月初五日臣方整旅進攻肅城而洪水報警海彞出口勢甚猖獗兼准甘肅撫臣周文闕手本催兵孔亟臣受國厚恩何敢顧此失彼隨撤兵而東親自臨陣以鼓士氣仰仗天威逺播海彛望風逃遁唯逆􅉰未滅猶煩宵旰臣罪莫逭伏思􅉰氛一日未靖肅州一日未復肅州一日未復臣心一日未安夙夜焦思不得不復謀大舉併力合圍庶幾肅城指日可下正與撫臣周文闕商𣙜進兵間于十一月二十日據臣標中軍署中營遊擊孫加印報稱本月十八日三更時候卑職遵令領兵首先登梯從東北角爬城詎賊死守矢石齊發被我兵鏖戰登陴當晚尅獲東北二城餘賊猶踞守西南城樓等情又據署肅州副將齊陞報據金塔寺守備馮得名塘報䝉古昻漢部落不下數萬絡繹入境口稱往西朝藏蹤跡詭秘等情又接副將馬寧手劄内云金塔寺海彞來有萬餘駝馬極多口稱要去朝藏希速統兵前來堵截等語各到臣該臣細思􅉰情夙稱叵測况肅圍日乆能保其不與海彞交通結成表裏連合之勢今節據前報等縁由唯有先發制人之一策當即飛移督撫按臣知㑹臣隨星夜帶兵馳赴肅州於二十七日率領標下副叅遊都守趙守義等官兵三千員名兼程飛馳到營一面令臣標遊擊張三耀領兵五百名截斷䝉古昂漢來路一面令副將馬寧調度各營官兵内外夾攻逆􅉰雖髙砌墻垣堅守西南被我兵奮不顧身蜂擁爭先勢莫敢攖當將􅉰首丁國棟活擒下城時賊方在危急之際􅍆命拒戰而我兵鋭氣所向無前于二十九日巳時又活擒􅉰首黒成印併前所獲共二逆俱交副將馬寧押解督臣孟喬芳處審驗獻俘請旨發落此一役也纒漢􅉰首悉已伏誅僅存殘孽臣復率兵四面捜勦當陣查斬逆賊首級十顆仍交馬寧藳竿懸示計此兩陣共斬􅉰級五千有竒其餘兔脱鼠竄零星殺死者無算但城池雖復民心尚在驚惶撫綏勞來不可無人隨即移㑹撫臣周文闕併檄副將馬寧將署肅州副將齊陞署兵備道賈還真署監屯㕔曹維翰佈置城内以集逃亡從此肅州之民有官以撫之矣尤慮地方甫定彈壓需兵除督臣孟喬芳原留駐肅馬步官兵五百員名外再于臣標下撥兵六百名暫駐肅州併嘉峪闗兩處策應以杜昻漢彞人窺伺之端俟大定後聽臣調回歸標從此肅州之險有兵以守之矣更查肅州連歲用兵倉箱如洗目今兵馬所需糧料現在仰屋臣仍㑹同撫臣周文闕道臣賈還眞動支額銀於附近產糧處所糴買麥豆以佐軍需從此肅城之兵有糧以資之矣更昂漢諸彞亦被我兵逐出金塔寺三百餘里外斬首二名獲馬三匹從此衝要之區亦漸次底定矣是皆仰仗我皇上威福之所致也臣謹臚陳破賊情形及善後事宜以仰慰聖懷所有行間有功人員并陣傷輕重官兵馬匹等項據副將馬寧册報轉移該撫臣查報外縁係恢復地方理合題報伏乞皇上睿鑒勑部察議施行謹題請旨順治七年正月二十二日題奉旨兵部知道鎮守甘肅等處地方總兵官都督僉事臣張勇謹奏為欽奉勑諭恭謝天恩事順治七年五月二十六日臣差官雷尚雨從京齎到勑諭一道欽此欽遵該臣率領官屬匍匐出郊恭迎入署䖍設香案望闕叩頭俯伏捧讀勑書所載煌煌天語炳若日星赫赫龍章光同琬琰綏疆方畧得廟算而無遺專閫事權賴王言而益重凛九重之謨訓動自合宜遵一代之典章事無過舉臣以駑駘下乘深荷鞭策之加但恐樗櫟散材莫勝棟樑之任既幸邀乎異數自圖報於將來不敢稍逸稍安上干國憲唯知矢忠矢慎仰答天恩總期無負朝廷簡拔之榮庶幾少盡臣子捐糜之念者矣縁係欽奉勑諭事理臣謹繕疏奏謝伏乞皇上睿鑒施行順治七年六月初四日奏奉旨知道了該部知道鎮守甘肅等處地方總兵官都督僉事臣張勇謹奏為敬竭愚忠懇調繁劇上報國恩下盡臣職事竊臣聞推心置腹者帝王待下之誠竭力殫忠者臣子事君之義昔終軍甫弱冠即欲請纓繫南越王致闕下馬援耄年猶據鞍顧盼以示可用臣雖一介武夫然治兵之暇每流覽古人壯志竒蹟則又未嘗不贊歎而欣慕之也念臣自歴行間荷䝉皇上拔於儔𩔖之中破格任用時即感泣聖恩知有國而不知有家知有君而不知有身此念久已自矢矣嗣於順治五年間河西逆􅉰倡亂滋擾地方臣隨師征勦不避矢石仰仗天威逺播羣凶授首所有失陷城池節次恢復䝉皇上鑒臣微勞加陞總兵官鎮守甘肅自維効命疆場於兹七載雖功不掩過而報主之誠心固未嘗一日忘也况臣叨受國恩不為不深上而祖父槩膺榮褒下而子孫均叨世襲如此寵眷即頂踵俱捐亦難報稱乃猶尸位素餐偷安歲月縱天朝寛大之典或可優容而臣自返於心不能無愧按甘肅地處極邊夙稱衝險固用武之區也今則逺人歸服土宇廓清民處其間安生樂業養而教之可以坐觀化理矣獨南氛未靖小醜尚在跳梁臣閲邸抄勦撫俱未就緒致厪聖懐毎一念及未嘗不南向眦裂誓不與賊俱生也夫叛逆未滅正武臣爭先効命之時今臣坐鎮河西幸值清晏與其以久逸之身虛糜好爵孰若代久勞之將奮志前驅且臣年方壯兼有隨帶親丁自備馬匹足資臂指若不及此時為國効力日復一日君恩未報兩鬢如霜欲求如壯歲之摧鋒陷陣斬將搴旗又何可得哉籲乞皇上俯鑒愚忠允臣陛見廷授方畧統師前進滅冦安民庶幾少報國恩於萬一也至臣衞註西安妻子或仍住陜西或搬移至京統祈皇上睿鑒勑部議覆施行順治十二年二月二十五日奏奉旨張勇久歴巖疆勞績茂著今奏請効力繁劇忠勤可嘉著即來京以俟簡用附山陜總督金礪題疏題為鎮臣奉旨需用重地闗係匪輕謹據實上請仰祈睿鑒事臣于本年八月二十一日准兵部咨為敬竭愚忠懇調繁劇上報國恩下盡臣職事該本部覆甘肅總兵官張勇奏前事等因奉旨張勇久歴巖疆勞績茂著今奏請効力繁劇忠勤可嘉著即來京以俟簡用欽此備移到臣隨經轉行遵照去後但念甘肅一鎮孤懸河西外環䝉古内雜番族兼之哈密纒頭等彞逼處西偏撫綏駕馭全賴賢能鎮臣威望優崇方資彈壓且自順治五年米丁二逆叛變之後所在殘廢張勇多方整理漸有起色况黄台吉部落不時遊走内地從而設厰互市飭備脩防無非張勇之經畫况能破格養人自備甲馬番族䝉古從無侵擾之患見今商賈通行民安畎畝所謂邊壤之長城一方之保障也今乃自請効力繁劇是出忠君愛國之心遂荷我皇上俞旨召用蓋亦嘉其誠悃不以長材屈于短馭也然張勇赴京必須另推一將來任邊疆顧甘肅重地番部雜處易動難安新來鎮員恐未必即能奏效一旦易人易地何如輕車熟路之為便也况甘肅南方皆為朝廷封疆與其另推更換不若仍留張勇鎮守斯土庶于地方有賴邊防永固耳臣有封疆之責良以重地所關不敢不據實上請伏乞睿鑒施行謹題請㫖順治十二年九月十五日題奉旨張勇赴京朝見已有旨了金礪不必議留兵部知道鎮守甘肅等處地方總兵官都督僉事臣張勇謹題為欽奉上傳事順治十二年二月二十六日䝉兵部劄付内開准吏部咨稱順治十二年正月十九日捧接上諭諭吏部朕撫育萬方夙夜祗慎講求愛民之道不啻三令五申乃年來水旱相尋干戈未靖民窮莫拯兵食不充上德弗宣下情壅塞所以致此弊非一端朕已廣開言路博詢化理復念天下至大民情土俗所在不同地方各官身親實歴凡兵民疾苦政事利弊必皆灼知於心耳聞目見最為真切今文官自督撫以下知府以上武官自提督總兵以下副將以上管轄之内職掌事理向來積弊何以得清見今整頓如何而可俱著詳切直陳無隱以資採用司道知府副將各陳奏一次知其病即備其藥言其害即舉其利無得浮泛雷同茍且塞責負朕周諮勤民至意爾部即傳諭行特諭欽此捧接到部備劄到臣該臣竊聞之主治者君也佐治者臣也君臣一德則政簡刑清化行俗美天時不能災人事不能害又何水旱干戈之足以累至治哉粤稽古帝王之世治稱上理乃堯有九年之水湯有七年之旱舜亦有苗民之梗化此豈古帝王之治有未純耶抑亦天時人事之莫可如何在人君唯有與諸臣益務脩德而已迨其後元圭錫而水土平矣桑林禱而甘霖沛矣干羽舞於兩階而苗民嚮化矣可見天時人事之變終無損於君德也臣今恭繹綸音仰見我皇上敬天勤民之意其所以廣開言路博詢化理者無非欲大小臣工恪供厥職念切痌瘝使水旱潛消干戈偃息以共成樂利之風此即古帝王之心也臣以庸劣謬任邊鎮唯隕越之是懼何能仰贊乎髙深然向來之積弊與見今之整頓皆臣所見所行者敢不一一為我皇上陳之夫甘鎮去京師萬里東距西寧為海藏門户西距肅州為哈密咽喉部落衆多四面環遶營路城堡中處一線往往窺伺搶掠匪朝伊夕今幸聖化覃敷番彞傾服内外一家可謂超軼前代矣乃前此之兵民猶交困者何也弊在甘肅總兵官尅減軍餉耳查甘肅曩日馬戰兵一名月止支銀一兩四五錢步戰兵一名月止支銀八九錢守兵一名月止支銀六七錢其餘餉銀盡被鎮將扣尅甚至數月不給兵皆饑寒逼身且私佔空糧按月虛冒上下禮節坐派營官更有官庄田地勒令兵丁耕種收成之日子粒盡歸鎮將而耕田之兵不與焉兵安得而不困也弊又在甘肅總兵官尅剥小民耳夫民之生計所以贍家口也今鎮將所需之油鹽酒菓米蔬柴炭之𩔖悉取給于衞官衞官則派及行户上下輪流供應不絶以貧民有限之膏脂飽鎮將無窮之需索民安得而不困也然其弊之所積更有不堪言者矣從來兵心不齊恃有法以治之今鎮將唯利是圖又安有所謂法者以鈐束營兵哉查甘肅昔時有一人當兵而父子兄弟併親戚交遊輩悉冒在營名色霸佔行市或遇鄉民載賣柴草糧食等物輒三五成羣出城一二十里或三四十里勒令短價賤買貴賣致百姓不敢進城貿易而生路幾絶毋怪乎兵化為賊民盡為盗所以順治二三四年間屢經譟變釀成􅉰亂者職此之故也所謂向來之積弊者如此臣自順治五年銜命來甘彼時殘黎兵燹城郭丘墟白骨盈郊傷心慘目臣仰體皇上以天下為家之心甫至其地即以農業為先務也乃買備牛種勸其及時耕作繼則以行旅宜通也見有市㕓焚燬客商露宿者即行捐助脩理店舍量給貲本令其招商營生且以凍餒之宜恤也毎於青黄不接之際隨力賑濟以稍甦窮民之困苦者至於城垣傾圮則僱夫脩葺凡一切支放軍餉屯糧官庄及營伍雜費併從前陋規如日用油鹽蔬炭等項微有損于軍民者盡行革除迄今七載兵民頗相安矣所謂見今之整頓者如此若夫訓誡將弁約束健丁整飭邊防讋服番彞此臣職分宜然何敢冒干天聽唯願軍前諸王侯同經畧諸臣運籌制勝立掃逆氛出斯民於水火之中將見水火既出兵無征戰之苦民鮮轉輸之勞人事協而天時和又何水旱之不潛消干戈之不偃息猶致煩宵旰之憂也哉縁係直陳地方事宜理合具題伏乞皇上睿鑒施行順治十二年三月初三日題奉旨兵部議奏欽此該臣等看得甘肅鎮臣張勇盡革陋規多方整頓兵民相安該鎮職掌無容再議奉旨依議欽命五省經畧右標提督總兵官臣張勇謹奏為恭謝天恩事竊臣謬膺節鉞罔諳韜鈐志雖切乎殫忠功實難以補過每抱慚於衾影恐致負夫髙深迺荷皇上簡拔之恩久鎮甘肅衝要之地稍弭邊患悉仗天威兹奉新綸復調今職敢昧致身之義寧辭竭蹶之勞且得入叩闕廷覲天顔於咫尺因而恭承謨訓領廟算以馳驅兼叨内府殊頒更允京師賜第聖恩浩蕩誠千載所難逢臣識迂疎愧一籌之未展但願有生之日皆為圖報之年畢力駑駘實永矢夙夜盡捐頂踵庶少效涓埃者矣臣謹恭設香案望闕叩頭謝恩訖理合繕疏奏聞伏祈皇上睿鑒施行順治十三年三月二十五日奏奉旨知道了該部知道欽命五省經畧右標提督總兵官臣張勇謹奏為恭謝天恩事竊臣以愚鈍庸材荷䝉皇上不次隆恩陞授湖南右標提督勑令陛見優加賞賚恩遇已極及至辭闕復荷天語諄諄指示臣鏤心刻骨感奮曷巳今于本年三月二十七日䝉兵部發給經畧右標提督總兵官劄付一張王命旗牌八面桿又䝉禮部頒發闗防一顆臣即䖍設香案叩頭跪領訖切思謭劣微材濫竽重寄時凜素飱之懼恒懷尸位之虞惟當勉圖竭蹶仰答宸恩効力馳驅劻勷王事雖莫能酬髙厚于萬一庶幾盡涓滴于寸心耳縁係恭謝天恩事理謹具奏聞順治十三年四月初一日奏奉旨知道了該部知道欽命五省經畧右標提督總兵官臣張勇謹奏為恭報微臣到任日期叩謝天恩事臣于順治十二年八月内捧接部劄䝉皇上陞授湖南經畧右標提督仍令陛見仰承天語諄切賞賚殊常浩蕩鴻恩捐糜難報臣辭闕赴秦整頓兵馬于十三年五月二十四日介馬南馳沿途糧料車船脚力各項齊備各官兵并家口俱于十三年十一月初十日抵湖南長沙府臣擇于十一月十六日在公署恭設香案望闕叩頭謝恩到任管理經畧右標提督總兵官事務訖仍將所帶兵馬備造花名文冊呈送經畧輔臣查核聽候奏聞竊臣迂疎謭劣蚉負難勝夜寐夙興虛糜是懼惟竭馳驅之力以矢犬馬之效而已臣曷勝感激惶悚之至謹具奏聞順治十三年十一月二十二日奏奉旨覽卿奏謝知道了該部知道附經畧洪承疇薦疏題為特舉卓異武職官員以襄大典事竊照考選軍政為朝廷黜陟鉅典闗係最重臣案准部咨題覆續陳軍政事宜等事一疏内開今武職中豈無亷能智勇超出羣𩔖者請勑下督撫查照文職卓異事例毎省量舉二三人開列實蹟分送查核妥確恭呈御覽欽遵在案臣今應查照上次軍政事例將臣經畧各標營提督鎮將大小各官親行嚴加察考内有亷能智勇超出羣𩔖堪應卓異官員必應照例據實特舉以光大典今查有提督總兵官一員謹照文職大計卓異事例具疏逐一為皇上陳之經畧右標提督總兵官張勇事實一本官奉調湖南招集親丁二千餘名凑備戰馬五千餘匹製造盔甲器械不惜巳資力為報効一本官于順治十四年十一月内親統官兵晝夜星馳先赴寶慶之永豐堡地方迎䕶義王投誠大衆保全無虞一本官隨大兵進取貴州親統各鎮各標挑選火器精兵同滿洲先鋒營前進追賊放塘開山墊路後抵鎮逺府以東之三十里地方堵截靖州逃賊髙文貴等逺遁隨大兵速進貴州一本官分駐清平縣撫綏苗民安業又招致偽伯武邦賢等歸順興隆重安江一帶俱獲安堵一本官綂兵同滿洲大兵攻勦十萬溪險寨親率本標官兵用命先登以成首功塘報有據一本官隨王師進征雲南分同先鋒營前進沿途招出偽將軍林得勝等衆又于雲南招出偽將軍王玉隆劉之復偽總兵劉玉田盧朝陽等十數起捐貲安插得所一本官進雲南後親統官兵捜勦彌勒州阿迷州等處逃賊招撫州縣軍民土司多有歸誠一本官先到雲南率兵同滿兵保䕶賊遺倉糧為數甚多後經盤量得濟大兵八九箇月支用考得本官智足籌邊忠圖報國竭家資而不惜集士馬以從征進貴州則同大兵以涉險取雲南則隨前鋒以先登故招撫偽營獨多保䕶倉糧得濟威名丕著功績超常洵應卓異以表偉伐所當據實特舉伏乞皇上勑下該衙門再加查核如果臣所舉不謬聽候請旨裁定遵行順治十六年十月二十九日題奉旨該部院知道欽差雲南臨元廣西提督總兵官臣張勇謹奏為恭謝天恩事臣于本年正月十三日准雲南撫臣袁懋功手本為推陞提督事内開准兵部咨開奉旨是張勇著以左都督充提督雲南總兵官寫勑與他欽此備移到臣該臣伏讀之下感泣失聲竊念臣本庸材韜畧素昧過䝉世祖章皇帝破格優擢寸報未展負罪實深今復䝉皇上特恩宥臣既往之愆授臣全滇重任但臣兩腿先年俱帶重傷不時痛楚去年四月内又復大發近雖腫痛漸消猶難乘馬宿疾未痊不無疎曠之虞至於効力邊疆臣之職也亦臣之願也敢不竭盡犬馬之力自矢捐糜之念祇期圖報于此生仰答國恩于萬一耶臣謹恭設香案望闕叩頭謝恩訖實不勝感激悚惶之至謹具奏聞康熈元年正月十五日奏奉旨覽卿奏謝知道了該部知道提督雲南總兵官左都督臣張勇謹題為特請舊員隨往新任查缺補授以固重地事竊臣前在甘肅時邊疆效命雖少有微績而所頼以左持右挈者實二三標員贊襄之力居多如臣標署守備今現任雲南提標管右營遊擊事王進寳者素優膽智夙裕韜鈐行師則紀律必嚴馭兵以恩威並濟明勠力捐軀之義擅提綱挈領之長不特才技過人亦且果敢邁衆誠今日武臣中之翹楚者也又臣原任經畧右標旗鼓因奉旨裁缺隨經前任經畧臣題補貴州鎮西城守都司僉書强自行者歴練營政諳熟兵機䧟陣摧鋒矢石不避亦可稱將弁中之不可多得者矣以上二員向臣見其在西陲實能盡職且備悉屬羌情形邊外地利兹臣欽奉上諭調遷甘肅保固兩河正在需人非此二員不足以資訓練懇祈皇恩俯允隨臣仍赴甘肅俟臣到任後查有相當員缺另疏題補不獨臣得以再收臂指之用即此二員久從行間始終相信亦未有不歡欣鼓舞均思報效于將來者也臣為人地相宜起見伏乞皇上睿鑒勑部議覆施行謹題請旨康熈二年十一月初四日題奉旨兵部議奏欽此查王進寶强自行既經該提督疏稱備悉屬羌情形始終相信應准帶赴甘肅遇有相應員缺題補其雲南提標右營遊擊貴州鎮西城守都司僉書各員缺另推奉旨依議提督甘肅總兵官左都督臣張勇謹奏為遵例自陳仰祈睿鑒事臣本一介武夫恭逢聖世䝉世祖章皇帝不次錄用拔臣於稠伍之中數年間授以甘肅重鎮順治十三年内調征雲南特加右都督充經畧右標提督總兵官順治十六年内進征雲貴復加左都督順治十七年軍政經畧臣洪承疇題舉卓異在案近奉新例停止軍政以歴俸三年考滿查臣于順治十八年正月内䝉發到部劄為議設全滇鎮將兵馬等事擬臣以原銜左都督改充鎮守雲南臨元廣西等處總兵官覆奉俞旨劄付前來于本年正月十七日到任康熈元年正月内奉兵部劄付為推陞提督事奉旨是張勇著以左都督充提督雲南總兵官寫勑與他欽此備劄到臣于本年正月二十一日到任十一月初二日准雲南督臣卞三元咨准兵部咨為邊兵缺乏軍器等事題覆臣捐銀二千兩零製造軍器紀録二次遵奉在案二年九月初九日奉兵部劄付為欽奉上諭事内開奉上諭雲南提督張勇前鎮守甘肅地方威名素著屬番讋服著以提督現任職銜仍調回甘肅鎮守欽此備劄到臣臣驚聞新命隨具疏恭謝天恩訖臣自順治十八年正月十七日以左都督任雲南臨元廣西鎮康熙元年正月二十一日以左都督任雲南提督扣至康熈三年正月止連閏歴左都督俸三十七箇月相應遵例考滿具疏自陳伏念臣受國厚恩慚無寸報自隨征雲貴以來始而鎮守臨元内輯土司外禦羌冦雖勉殫駑鈍之力巖疆稍獲安寧然職分所在功不補過我皇上不加斥譴仍命提督全滇屢竊恩榮一籌莫展乃者邊釁廓清南維底定實賴皇上威福臣有何功久尸厥位復荷新綸調鎮甘肅但臣幼在行間屢出征勦兩腿帶傷不時發痛今年四十有六精力日衰夙患愈痼雖凛遵成命矢圖報效以期無負任使至意然臣自揣羸病誠恐難任衝邊蓋疎曠之罪雖不輕而封疆之責為更大臣謹據實自陳伏乞皇上勑下部臣嚴加考覈别選賢能俾無貽悞于巖疆且以垂戒于曠職臣無任激切惶悚之至仰祈睿鑒施行謹具奏聞康熈三年二月初六日奏奉旨張勇著復職應得恩典察例具奏欽此查凡提督奉旨復職應得恩典察例具奏者照例賜羊酒表裏縀疋應否加銜加級出自上裁恭候命下臣等遵奉施行康熈三年五月二十六日奉旨張勇先在甘肅時著有勤勞近又以甘肅要地近于邊外䝉古調補著加太子太保餘依議張襄壯奏疏巻一
