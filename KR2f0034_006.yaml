body:
  text: 張襄壯奏疏卷六甘肅提督靖逆侯張勇撰靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙十八年十二月初八日臣男大理寺少卿臣張雲翼欽捧御匾御卷到臣臣即出郊跪迎入署恭設香案望闕叩頭謝恩祗領訖竊臣鈍質菲材素餐尸位疊荷九重之異數每撫寸衷而多慙欽惟我皇上德懋中和道隆純粹禮樂既光於四表文章更煥於八方固已逺邁百王上超五帝者也且萬幾稍暇常欽聖學之勤乃三錫頻頒復荷宸章之賜赤文緑字奎毫騰鳳翥之姿鐡畫銀鈎金管展龍紋之彩灑瑶箋之雨露御墨流香揚天漢之波濤筆霖溥潤捧來邊徼星日同輝賜出闕廷球圖共重雖天恩浩蕩率土莫不尊親而睿藻繽紛闔門盡皆焜耀誠為鎮家之寶允稱垂世之珍者矣臣曷勝歡呼無任感激為此理合奏謝伏乞皇上睿鑒施行康熙十八年十二月初十日奏奉旨該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為欽遵勑諭留秦敬陳進勦形勢事康熙十八年十二月初八日學士臣希福捧頒勑諭一道到臣併口傳天語以臣疾痛頻呼蜀道峻險不必提師逺涉唯三邊重地加意固守臣跪聽宣讀之下感激涕零念臣以餘生未盡之年當茲遺孽盤踞之際疆場效命正得所終乃荷皇上愛育周摰令臣仍留秦省保固地方叨恩深重未報涓埃惟念漢興攻克之後不可不即圖破蜀查川蜀賊兵悉抽於編氓之中勒令充伍似此烏合嘯聚之徒復鮮約束訓練之法此所謂驅市人而戰也一經對壘未有不各顧身家而四散奔遁者四川如此雲貴可知况賊新敗之餘膽落心驚必無鬭志我應亟乘此戰勝之兵鋭氣自倍速從興漢湖南廣西等處分道前進大舉撲勦出其不意直搗巢穴賊必倉皇失措不及防護隘口我兵環而攻之滇黔可指日而定也但臣受國厚恩誓期死報敢憚川路之險而茍且偷安方擬請旨親統三鎮屬官兵由文縣一路進發適學士臣希福宣布聖諭臣不敢不欽遵留秦固邊所有疏稿繕成業經學士臣希福閲過相應一併聲明伏乞皇上睿鑒施行康熙十八年十二月初十日題奉旨該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為保舉才能補授邊營員缺以資固圉事竊照西寧南川營逼近番族乃極邊衝要之地隄防守禦實惟營員是賴若任用非人不無疏虞廢弛之憂故遴補是缺者恆加慎也查該營守備惠得才已經病故所遺員缺關係衝邊不便久懸選得原鎮番營陳亡參將陳應啓嫡子陳天策生長將門素諳軍旅向隨征臨鞏等處歷著勞績其膽智過人久為行間所推許用補南川守備允稱斯職况其父陳應啓血戰疆場重傷身殞題奉俞旨準廕子弟一人以守備用今陳天策既係陳應啓嫡子才復堪用以之補任衝營不獨有裨邊防且令死事臣裔得沐皇仁擢用并可以慰忠魂於地下矣其激勸將來實非淺鮮者也除將保結履歷送部外臣謹會同甘撫臣巴錫合詞具題伏乞皇上睿鑒勑部議覆施行康熙十九年正月二十五日題奉旨兵部議奏欽此議得該將軍侯既稱陳天策係陳亡參將陳應啓嫡子請補西寧南川營守備保題應如所題可也奉旨依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為邊患正殷防禦尤亟請復舊制以固邊疆事康熙十九年二月初四日準涼州提臣孫思克咨稱向來邊患在南山一帶故前任總督羅多議將大靖參將移駐安逺地方將安逺守備移駐大靖地方今北邊之彛患更甚于南山此永昌副將達爾護所以有仍循舊制將安逺參將調回大靖大靖守備調回安逺之請也查安逺離黑松堡三十餘里今大靖守備標下額設把總一員馬步兵丁共二百七十五名合無將守備帶領兵馬二百名移駐安逺其餘七十五名內撥馬兵十五名步戰兵二十名守兵四十名令把總帶領駐防黑松堡以防禦哈西榨等口則安逺得有應援矣將安逺參將帶領原營馬步官兵七百員名仍駐大靖則大靖亦可無疏虞之患矣夫仍循舊制既不增添兵馬又不重費糧餉不過轉移更換間而南北兩邊俱可以獲寧謐者也合亟咨請查照俯賜主裁會題等因到臣準此該臣看得大靖設立參將營制原以禦防套彞自海彞部落入牧大草灘前任督臣羅多巡閲邊界因見安逺逼近可可等口直通彞巢乃彞人出沒之路是以將大靖營官兵題請移駐安逺也今大靖接連鎮番鄰近套彞部落遊牧北邊屢犯內地一守備持兵實難防禦緣目今正在用兵之際不便議增應那緩就急將安逺參將并額設官兵仍移駐大靖以大靖守備之兵移駐安逺而黑松堡為番族環居之處應照提臣所議分撥大靖把總一員馬步兵七十五名駐防黑松堡以堵禦各榨口者也既經咨會前來臣謹會同督臣哈占甘撫臣巴錫涼提臣孫思克合詞具題伏乞皇上勑部議覆施行康熙十九年二月初八日題奉旨兵部議奏欽此查該將軍身在地方既將安逺參將官兵仍移駐大靖守備之兵移駐安逺應撥大靖把總一員馬步兵七十五名駐防黑松堡等語應如所題換給關防劄付可也奉旨依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹密題為請調秦省緑旗官兵進定滇黔事康熙十九年七月初五日準陜西總督臣哈占咨準勇略將軍部院趙良棟咨開建昌永寧兩路率皆猓猓苗蠻不毛之地必須留兵防守而雲南為賊老巢逆孽無可退可守之處計惟負固死戰以冀僥幸我之統兵進攻者豈可不廣加籌慮以期必勝哉今會同商議擬調涼州一鎮馬步兵三千名令參將康調元統領前來以濟進勦急用等因準此隨會同撫逺大將軍公圖海查得陜西地方遼闊甘涼鄰近彞境海彞遊牧不定亦須多兵彈壓但進勦雲貴事關重大今議調貴將軍侯標下兵丁五百名涼提孫思克標下兵丁五百名甘肅鎮屬各營路兵馬一千名靖冦將軍標下兵丁五百名尚少五百名查順承王來川帶有本部院標下守備朱貴領兵五百名以上共合三千之數除會覆勇略將軍徑移調用外相應移明煩為查照等因到臣該臣看得進征雲貴固屬急務而固守川屬尤關至要查前奉旨令奮威將軍臣王進寶固守四川今已經回固原養疾臣願領兵前赴四川固守查目今河西見有臣與涼提臣孫思克駐劄莫若免調甘肅之兵令涼提孫思克回駐甘涼彈壓河西臣領標兵三千赴川駐守庶進戰爭前險要有守雲貴之克可指日而待即臣滅冦之志報主之心亦得以少遂矣理合具題伏乞皇上睿鑒勑部議覆施行康熙十九年七月初六日題奉旨議政王貝勒大臣會議具奏欽此查秦省關係緊要是以奉旨特令大將軍公圖海將軍侯張勇等鎮守應令將軍侯張勇不必赴川仍遵前旨防守秦省至該將軍侯疏內所稱免調甘肅之兵令涼提孫思克回兵臣領標兵三千名赴川駐守庶進戰爭前險要有守等語今進取雲貴期逼若調沿邊之兵則致有誤應令將軍侯張勇挑選伊標兵三千名責令賢能官帶領速赴四川不誤進征可也奉旨依議速行靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為邊營必資能員懇乞題請就近擢補事康熙十九年閏八月初二日準涼州提臣孫思克咨稱竊邊疆與內地不同而甘肅與西寧諸邊逈異內則黃黑二番插帳山場外則厄魯特蒙古部落環處聚牧守禦隄防刻難疏忽至黑城一堡正當大草灘之中緊依雪山之麓所轄有白石崖與扁都後所三大口其餘零星小口不一乃至衝極險之區非得曉暢彞情周知險易才幹優長膽略素著者實難勝任今原任遊擊左文啓既以老病告辭衝邊營員不得不嚴加慎擇庶於邊防有賴茲看得標下前營中軍守備唐廷謨生長邊方備悉彞情久厯戎伍兼通彞語膂力方剛技藝絶優且征勦河東奮往先登戰功懋著合無請題就近補授黑城遊擊銜缺既已相當人地又復相宜似于邊疆有禆者矣至守備員缺看得標下右營千總方凱射技優長英年壯志鈐束兵馬紀律森嚴屢隨征討歷著勞績堪以就近請補此二辨者出征年久屢建竒功膽略才能堪膺専城之寄以邊才拔補邊缺誠戰守足恃而番彞知所畏懼者也謹循例保結咨請查照具題等因到臣準此該臣看得甘屬黑城營地處極邊衝口繁多內而番族外而海彞日事控禦惟恐不密必久歷邊地深悉彞情之員方為克副斯任該營遊擊左文啓病老辭職員缺業準提臣以前營中軍守備唐廷謨膂力方剛技射絶優隨征克敵屢立戰功就近請補其所遺守備員缺以右營千總方凱青年善射奮力征勦堪以補用查此二辨委屬才力優長技藝􅈺熟彞情地利靡不通曉補用各缺實於人地相宜邊營有禆者也既經保舉前來除結狀履歷送部外臣謹會同甘撫臣巴錫提臣孫思克合詞具題伏乞皇上睿鑒勑部議覆施行康熙十九年閏八月初六日題奉旨兵部議奏欽此議得該將軍侯既稱黑城營地處極邊將守備唐廷謨等保舉題補與例相符應如所題補授奉旨依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹密題為哨探彞情事康熙二十年五月十八日準涼州提督臣孫思克移咨到臣該臣看得甘涼肅悉屬邊外夙為番彞出沒叵測之區今自鎮番以至嘉峪關海彞遊牧不止萬餘盡係噶爾旦殺敗奔逃之衆屢侵內地而爾定合首吉等彞目復紏合各彞聲言入犯似此邊方擾動漸不可長臣隨遣前營遊擊王弼率領標兵五百名赴肅會同汛兵驅逐出邊去後續又據哨探報有海彞達賴台吉在河州邊外修搭河梁臣細度其故無非畏懼套彞噶爾旦聲勢將趨松潘躲避耳但海彞窮逼已極東西遊牧往來靡常性情難料萬一乘隙窺伺而邊長汛廣兵力單薄將何所恃以無恐也查目今調征四川者臣標官兵已撥一千員名涼提標并甘肅屬之兵已撥四千五百餘名西寧鎮屬已撥萬有餘名現在西寧闔屬等汛馬戰兵尚不足五百名步戰兵亦僅有五百名各處精鋭徴調幾盡所留存汛等兵實皆單弱際茲套彞與海彞各欲戰爭之時而西寧甘涼邊境防卒無多豈為未雨綢繆之良策臣思雲南已被圍困賊黨敗遁逆首吳世璠釜底遊魂旦暮授首似無庸多兵雲集而始克奏蕩平之功者也辰下彞情莫測固邊為亟莫若將臣標并涼提甘肅屬調征之兵俱行撤回將西寧鎮屬征兵量撤一半回汛以備不虞庶邊防有資而巖疆永固矣臣因防患未然起見理合具題伏乞皇上睿鑒勑部議覆施行康熙二十年五月十九日題奉旨兵部議奏欽此查陜西現在緑旗兵四萬有餘陜西調赴四川緑旗兵共有四萬餘名此調撥官兵見在進勦深入今正值直抵雲南勦殺逆賊平定地方之際其該將軍所請伊標并涼提甘肅鎮屬征兵俱行撤回西寧鎮屬征兵量撤一半之處不便遽議撤回應請勑下將軍趙良棟總督哈占等一得雲南省城之日題明將所調陜西官兵速行令其回汛既稱見今噶爾旦大舉來與海彞相爭則西寧甘涼邊境不能無虞應請勑下將軍張勇將省內不緊要地方兵預先速行量調暫行固守地方可也奉旨依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為稟報彞情事康熙二十年六月初四日準甘寧撫臣巴錫移咨到臣準此案照海彞攻圍撒喇將往洮州等情由業經題報在案矣但西寧鎮屬官兵徴調幾盡今海彞乘隙糾合西番兵馬計有一二萬前來攻圍撒喇查撒喇與揚威俱係內地中馬之番若此處稍有疏虞海彞必肆行狂逞則我邊陲恐難警息無聞目今兩河兵數寥寥無可遣發前雖撥兵五百名沿汛分防究竟安置不敷誠非星羅碁布未雨綢繆之良策也臣擬以涼提臣孫思克駐劄莊浪標兵回駐甘涼臣率臣標之兵前赴臨鞏相機勦撫并祈將臣前疏題請撤回臣標并西寧甘肅屬赴川各兵馬速勑回汛庶邊威克壯而防禦有賴矣伏乞皇上睿鑒勑部議覆施行康熙二十年六月初四日題奉旨兵部議奏欽此查已議一得雲南省城之日題明將所調陜西官兵速行令其回汛今該將軍所稱前赴川兵馬速行回汛之處無容另議至將軍張勇身在地方悉知情形查照緩急將提督孫思克駐劄莊浪標兵回駐甘涼伊親身率領標兵赴臨鞏相機而行應如所題該將軍親統伊屬官兵前赴臨洮鞏昌固守地方相機而行可也奉旨依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹密奏為臣病危篤恐誤封疆謹瀝血泣辭仰祈亟簡賢能以重閫寄事竊照甘肅為西秦門戶提督為邊鎮綱維汛廣地寬任大責重臣謬膺節鉞待罪茲土敢不悉心籌畫加意隄防奈緣箭瘡腫痛百病交攻雖勉強支持精力莫濟故年來屢疏乞休無非以險阻衝要之區必得強幹精明者始足以重彈壓而資控制若以臣之羸病而猶寄以邊務何異責眇者之能視跛者之能履也將見貽誤封疆有不可勝言者矣乃疊荷溫綸著臣照舊供職或者皇上謂疾痛人所時有調攝自可獲痊抑以臣在邊日久頗熟地利彞情故不以衰殘困憊而加擯斥詎奈臣之中毒已入骨髓有愈久愈劇之勢斷無漸輕漸減之時藥餌空投療治何益是臣之痼疾自非調攝所能痊也我國家生才之盛卓越前代其間懷竒負異堪備干城之選者實繁有徒唯皇上鑒而拔之用專邊閫靡不立奏膚功是可任甘肅提督之責者舍臣之外正自多人也况臣今年六十有六櫛風沐雨之餘血氣早已消耗耳目既無聰明牙齒亦皆脫落加以傷䀶潰裂膿血迸流痰火薰蒸不時暈仆曩用肩輿以代步履今則仰臥床簀不能屈伸命若懸絲料亦不久人世自維筮仕以來幾四十載銜加宫保位列通侯誥命光前世襲裕後人臣遭際至此為極死復何恨但受兩朝寵眷未效涓埃倘犬馬之殘喘難延則髙厚之殊恩莫報不禁伏枕涕零而不能自已也伏懇皇上俯念三邊重地鑒臣病勢危篤亟簡賢能以固疆圉俾海彞絶窺伺之隙軍民獲寧謐之休臣雖委填溝壑亦瞑目於地下矣臣無任激切惶悚待命之至為此具本謹奏請旨康熙二十年十月初六日奏奉旨卿簡任提督勞績懋著巖疆事務重大正資料理著照舊供職不必以病求罷兵部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹密題為海彞充斥邊外防禦必當先籌請撤提臣回汛以固疆圉事竊照甘涼肅沿邊久為海彞駐牧故設提鎮以資彈壓但曩者止禦南邊之彞今忽有祝囊遊牧于北而乞慶汗部落被噶爾旦殺敗陸續逃散為數甚多窮逼無依盡歸祝囊往來于鎮番金塔寺邊外等處遊移不斷而鎮海沿邊之彞尤實繁有徒臣差通事出邊查探大小彞目不下三十餘名俱係窮困其飢寒之狀不堪矚目萬一為衣食所逼乘機窺伺則我內地恐難保其無事也今甘涼肅標營并臣標兵丁調征四千五百名將備等官選去三十餘員即南邊之彞防禦尚且難周倘或入犯猶慮本汛兵單前轍可鑒豈復能禦北彞而壯我邊威耶查督臣哈占前以涼提臣孫思克題駐莊浪原因西寧鎮屬官兵調征大半留汛者多係守兵不能防禦而莊浪乃西寧要口是以令涼提暫駐遙為控制今莊浪副將孫繼善已領原調官兵二千到汛而河州副將劉忠原領進征官兵一千名亦經督臣檄令回汛固守沿邊則提臣孫思克似應率領標兵回涼分禦南北彞人以為綢繆之計者也理合具題伏乞皇上睿鑒勑部議覆施行康熙二十年十月初七日題奉旨兵部議奏欽此查該將軍侯張勇既稱莊浪副將孫繼善等已領兵回汛涼提孫思克似應率領標兵回涼防禦等語應如所題令涼提孫思克統伊標兵回涼固守地方可也奉旨依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為懇念戰功題請議敘以恤勤勞以示鼓勵事據洮州土司世襲拜他喇布勒哈番楊威呈稱竊照吳逆叛變城邑淪陷卑職父子於康熙十四年四月二十六日奉令統領漢土官兵五十員名攻圍岷城身先士卒汗馬衝鋒其間屣殺賊營堵截階逆追勦鞏黨生擒賊兵陳斬首級以及奪獲器械等項節經塘報在案賊因卑職等圍困三閲餘月力竭計窘始窮逼投誠計自十四年四月起至十五年六月止攻洮圍岷節次征戰共傷亡過土兵二百五十名土馬四百餘匹業於十五年八月內造册呈報伏思卑職父子盡忠報國矢志殱逆率領兵馬自備糧芻擐甲荷戈躬冒矢石交鋒對壘萬死一生未邀議敘之恩難免向隅之泣合將恢復功次呈懇再賜題請上以昭國家酬勳之典下以恤將士血戰之勞感戴鴻慈當生生世世矣等情到臣據此該臣案查恢復岷州有功人員經臣造册報部續準部咨以恢復岷州係賊自行投順在事各官無容議等因業已奉旨欽遵在案今據土官楊威復懇具題議敘等情前來臣又何敢復干天聽但查當日岷州議降實因楊威等圍攻日久賊屢戰屢敗窮極無路方始歸順與官兵一到即行獻城納欵者不同况原任洮岷副將楊朝梁自克復洮州之後即糾所屬各部土兵萬有餘衆于康熙十四年四月二十六日到岷將城圍困其間賊兵出城衝突悉被漢土等官兵殺敗入城又鞏昌階州等賊屢行救援亦被楊朝梁發兵截殺敗遁業經臣於密報土兵屢敗逆賊等事案內彚報部覆俟克復岷州之日將楊威等一併優敘奉旨依議欽遵在案茲岷州既經恢復正楊威等得邀議敘之時且自備糗糧不費國帑行間勠力奮不顧身以致傷亡土兵倒斃馬匹此皆實心為國勞苦功髙所當照恢復鞏昌蘭州之例一體優敘者也伏乞皇上俯念戰功有據勑部議敘不特大昭酬庸盛典即臣亦可無負土官急公尚義之初心矣為此具本謹題請旨康熙二十一年四月初二日題奉旨該部議奏欽此查恢復岷州有功人員該將軍既經造册送部應據册詳加查議可也奉旨依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為請録陳亡戰將之子以慰忠魂以勵後效事康熙二十年五月初八日準西寧鎮臣李芳述咨開竊照靖逆將軍侯標左營遊擊李𢎞鑒西寧鎮標中營遊擊米之順在于四川軍前用命陳亡曽經勇略將軍部院題準部覆奉旨加贈賜恤各準廕子弟一人以守備推用等因欽遵在案查鎮屬松山守備陳維新舊洮守備胡思容因臨陳退縮俱經革職所遺二缺均屬沿邊要地刻難乏員看得李𢎞鑒嫡子李元淙青年壯志弓馬􅈺習堪以擬補舊洮堡守備米之順嫡子米世惠年富力強騎射􅈺練堪以擬補松山堡守備相應咨請查照題補庶捐軀之二將銜結九原而邊疆之各官亦咸知激勸矣等因移咨到臣該臣看得臣標左營遊擊李𢎞鑒西寧鎮標中營遊擊米之順俱係疆場用命奮力當先以致重傷身死今皇恩浩蕩業準廕子弟一人以守備推用查李𢎞鑒嫡子李元淙年青志壯米之順嫡子米世惠力健才優既經鎮臣以李元淙擬補舊洮堡守備員缺以米世惠擬補大松山堡守備員缺保舉前來似應準補上以昭酬庸盛典下以慰死事忠魂者也除保結履歷送部外臣謹會同甘寧撫臣巴錫西寧鎮臣李芳述合詞具題伏乞皇上睿鑒勑部議覆施行康熙二十一年五月十二日題奉旨兵部議奏靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹奏為懇憐病勢危篤亟簡賢能允臣解任事竊臣年來箭瘡痛楚痰火薰蒸自知痼疾日久必無生機不過茍延嵗月坐以待斃而已故前後具疏籲請休致雖荷溫綸屢著留任然臣一日在邊一日戒懼祗恐精力莫支有乖布置致辜皇上付託之重用是殷憂莫釋耳此七月十六日蒙欽差大臣折爾肯訂臣會同閲視大草灘扁都等口臣因奉有會同閲視各地方之旨隨力疾肩輿前往永固城會閲訖及至回甘舊疾轉劇精神散亂撫臣并涼提臣等見臣病勢危篤遂各同欽差大臣前抵西寧寧夏各邊查閲臣以病不能從伏思君命為重臣身為輕猶冀調治稍痊再赴巡閲不料病勢日加腹心已壞視聽俱滅血痰不止動即昏暈夫甘肅何地提督何官而可令重病垂危之人臥而理之者乎叩懇皇上亟簡才幹精敏重臣前來彈壓鑒臣病篤俯賜解任地方幸甚微臣幸甚為此具本謹奏請旨康熙二十一年八月十七日奏奉旨卿簡任提督勞績懋著巖疆事務重大正資料理著仍遵前旨照舊供職不必以病求罷兵部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹奏為遵例自陳廢病曠職仰祈罷黜以重大典事康熙二十一年三月初五日準兵部咨為請行軍政大典以飭武備以勵人心事內開應自陳之提鎮務將本省各官文册起送之日一并自陳等因具題奉旨依議欽此欽遵備咨到臣準此竊臣蒙世祖章皇帝破格優擢歷任總兵提督復荷皇上寵眷仍假節鉞前後幾四十年深慚尸素未有尺寸之功少報髙厚自吳逆變亂以來三秦擾動郡邑失守臣矢志殱逆統兵渡河其間捐助鳥鎗糧料以佐軍需舉首偽劄逆書以抒忠悃勦滅賊冦恢復城池購戰馬以壯兵威造甲械以整軍仗皆臣分內之事乃沐皇仁疊頒優奬先授以一等阿達哈哈番次即畀以將軍之職旋膺侯爵子列卿班且賜第京師以恤臣眷銜加宫保秩晉少傅侯封一等世襲十代眷顧之隆有加無已此誠曠古所未有之遭逢以臣謭劣蒙被殊榮自應竭股肱之力以仰答國恩於萬一耳奈臣衰老之年加以痼疾因而溺職負罪實多查自康熙十一年軍政後每有因公詿誤如錯填火牌減寫徽號等事此皆由久病恍惚舉動紊亂之所致也雖皇上如天之量或可優容而廢疾竊位之愆臣實不能辭其責者矣况臣見今耳聾目瞶牙齒脫落兼之舊疾時作倐忽暈迷何堪以兩河衝要三鎮機宜而寄於奄奄一息之夫也哉茲當大典激揚之時正覩仕路肅清之日懇祈皇上俯念邊疆重地另簡賢能罷斥廢病庶黜陟以彰而軍紀以昭矣臣無任惶悚待命之至為此具本謹奏請旨康熙二十一年九月二十五日奏奉旨卿簡任提督克副委任勦禦賊冦安輯地方勤勞茂著可嘉著照舊供職該部院知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為請命提鎮次第入覲以重閫寄事康熙二十二年五月初四日準兵部咨開議得都察院左都御史希福等疏稱提鎮諸臣身在疆隅無不瞻望天闕思得仰覿龍顔等語相應令其入覲但提督總兵官有鎮守地方之責不便令其皆來應俟命下之日將直𨽻各省提鎮等職名開列具題恭侯俞旨馳驛調來俟到日入覲可也等因康熙二十二年三月三十日題奉旨將軍副都統提督總兵等官鎮守封疆關係緊要若槩行赴京朝見遠離汛守曠廢職掌有願來陛見者聽其自行陳請候旨遵行欽此欽遵抄出到部備咨到臣準此竊臣猥以菲材謬膺節鉞自皇上臨御以來抵今二十有二載其間寵眷之隆賞賚之厚不一而足臣雖待罪窮邊距京萬里而犬馬戀主之私固未嘗一日去諸懷也但曩因叛逆犯順肆行狂逞臣所屬郡邑悉遭淪陷警息頻聞時臣提師撻伐用彰天討臥甲待旦靡有寧晷故孺慕雖殷而軍務方亟亦不過心馳帝闕夢繞龍墀而已今賴天威逺播妖氛肆靖兩河城邑悉已恢復廟堂可釋西顧之懷臣子得遂覲光之願此其時也况臣景逼桑榆加以痼疾日深箭瘡腫痛痰火上逆不時發暈倘溘然朝露一旦就木是臣終身無由仰瞻聖顔其抱痛於九原又寧有已也茲幸奉有願來陛見聽其自行陳請之旨謹瀝下情懇祈皇上俯鑒愚忱允臣入覲俾得隨鵷鸞拜舞之班少傾葵藿向陽之志躬謝洪恩面聆廟謨臣即委填溝壑亦泉壤蒙輝矣臣無任懇切待命之至為此具本謹題請旨康熙二十二年五月初六日題奉旨張勇著來京陛見兵部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙二十二年八月初十日申時奉有天使二人到張井鎮口傳天語問臣在秦勤勞一路辛苦此八月十五日可以到京否臣跪聽之下不勝感激念臣濫竽名器老病衰殘祗以戀主心殷疏請入覲乃蒙皇恩寵眷遣使垂問於千里之外恍如春風化日令臣遍體生溫此誠曠代異聞允為一時盛典也但臣瞻仰念切恨不得飛叩闕廷以申孺慕奈腿病沉重不能乘騎一路肩輿耽延時日雖兼程之有心實倍道之無力咫尺九重徒覺葵誠益急耳今臣已抵張井鎮離京不逺計得仰覩龍顔為期伊邇者矣除臣伏地叩頭謝恩外為此具本謹具奏聞康煕二十二年八月十二日奏奉旨該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹奏為臣病危篤已無生機籲請俞旨迅賜解任事臣自流矢中傷之後始則瘡毒纒綿繼則火痰銷灼衰殘困憊已非一日乃屢疏乞休蒙皇上不即擯棄仍假節鉞臣雖感激思奮勉強支持然精竭髓枯肉消骨痿已無復生人氣色矣幸奉恩綸允臣入覲拜舞之下溫言慰藉寵賚洊加臣四十載感恩效命之私盡得傾吐於君父之側素願已遂夫復何憾兼獲叩謁世祖章皇帝陵下撫躬感激不覺五內摧裂淚繼以血猶期殫忠竭力少答皇上眷顧之恩仰報先皇帝知遇之德奈臣年已衰老病復交攻昨日匍匐丹墀弗能曲盡臣禮其傴僂局蹐不堪鞭策之狀已在我皇上洞鑒之中不意近為風寒所侵舊病較前轉劇向止痛腫今則潰裂而膿血迸流矣向止暈迷今竟顛仆而精神散亂矣食不下咽形體尫羸祗恐仰覩龍顔之日即為臣生死永辭之時也泣懇皇上俯憐鳥死鳴哀恩準解任所有未盡之忠勤臣當勉勵臣男矢效捐糜以圖報於無既矣臣曷勝惶悚懇切待命之至為此具本謹奏請旨康煕二十二年九月初三日奏奉旨逆賊吳三桂叛亂時秦省騷動卿會同大將軍等勦禦賊冦固守地方籌畫周詳勞績茂著今年邁患病雖真但係巖疆宿將韜鈐素裕尚可坐鎮調度以展猷為著照舊供職不必求罷兵部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹奏為恭謝天恩事竊臣庸愚薄質樗櫟散材向受世祖章皇帝之洪恩不次拔擢復荷皇上之寵渥破格優褒位既列於通侯銜又加以宫保謬専邊閫控百二之雄關沗任巖疆厯三十有餘載期遵廷訓求入覲以聆聖言欲仗廟謨資籌邊而奉睿算恭抒孺慕仰覩天顔乃沐皇恩俯準陛見爰尅期而就道冀銜命以趨朝奈以久病微軀遂致稍遲前路反邀寬典特遣侍臣詢問一路之艱撫慰千里之外不啻和風披拂恍同旭日照臨甫叩九重即隆三錫茶頒內府喜嘗御鼎之芬香宴賜上方飽飫天厨之珍錯拜先皇於陵寢恨當年未獲攀髯被聖代之簪纓念此生永懷刻骨撫今追昔由後思前及至謁陵旋京仍命中使逺迓歌𢎞湛露躬膺異數之榮寵賚彤弓目覩殊恩之溥聲溢中外光映寰區逮及陛辭又聞天語溫諭至再優賞頻加鞍馬帽靴不減球圖之盛袍服寶帶儼如琰琬之祥情可同於家人誰謂尊卑勢隔澤逈出於常制實唯上下情深洵為千載竒逢允稱曠世罕覯者矣但臣有何功何能叨皇上隆恩隆眷驚悚無已感激殊深緣臣屢抱沉疴久嬰廢病駑駘不堪鞭策蒲柳莫耐風霜竭誠繕疏乞休奉旨照舊供職今臣業於本年十一月二十三日前抵莊浪即恭設香案望闕叩頭謝恩訖謹具本奏聞伏乞皇上睿鑒施行康熙二十二年十一月二十五日奏奉旨覽卿奏謝知道了該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為報明微臣到甘日期事臣蒙聖恩俯準陛見自甘州起程赴京所有臣轄屬甘寧西三鎮地方邊務及各項欽部件並臣標五營兵馬事務當即移行各鎮將依限具報督臣并應進所屬武職官員各節表箋該鎮彚齊俟臣回甘日照舊料理業經題明在案臣于本年九月十四日陛辭出京因病軀衰老不能兼程至本年十二月十二日始到甘州將統轄各鎮事宜以及本標各營事務照舊料理外惟是甫離天顔恆深孺慕瞻戀之忱靡刻有已所有臣到甘日期理合題報伏乞皇上睿鑒施行謹題報聞康熙二十二年十二月十八日題奉旨該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹奏為微臣病勢已危邊疆責任為重泣辭解任亟簡賢能以資控制事竊臣去嵗仰荷俞旨允臣入覲俾拜舞丹墀獲申孺慕且深沐聖恩忭感曷已詎陛辭抵甘後舊病轉加較前尤劇手足腹心俱已敗潰耳目言語亦皆閉塞食不下咽僅存瘦骨支床萬無生機不過暫延旦暮而已臣聞人苦則呼天地疾痛則呼父母今皇上乃臣之天地父母也臣之疾苦至此為極臣之病痛亦至此為急不得不披肝瀝血遙呼皇上俯鑒危篤情狀迅賜解任亟簡賢能代臣邊缺庶得人控制疆圉無虞臣亦瞑目於地下矣至于甘肅為秦省門戶提臣為鎮將綱維幅􅊷遼濶彈壓必須能員臣前數疏俱已詳陳久在皇上睿鑒之中茲臣病勢危急恐措辭失倫不敢復贅臣無任激切待命之至為此具本謹奏候旨康熙二十三年四月初六日奏奉旨已有旨了該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹密奏為泣陳臣命之將終懇念邊疆之為重仰祈睿鑒俯納愚忠事竊臣猥以草芥庸材蒙世祖章皇帝舉於稠人之中不數年而即膺専閫逮皇上臨御復寄腹心謬承重任計受兩朝眷顧之隆迄今幾四十載矣自叛臣變亂于川滇而西秦亦為之擾動兩河地方類多淪陷時臣待罪邊鄙奉命勦賊日夜驅馳無有寧晷兼以間諜頻聞偽書相誘臣仗此孤忠唯知勠力故所失郡邑旋亦節次恢復此皆仰賴皇上威福及諸將士用命臣有何功况臣昔年為流矢所傷中毒已深病勢日篤恐誤巖疆屢疏乞休蒙皇上不加擯斥仍假節鉞從古得時遇主未有如臣之幸者也近以秦地廓清奏請陛見喜奉俞旨得覲天顔回甘之後猶冀一息尚存不辭竭蹶乃據報麥力幹入犯內地臣慮南北彞人合謀叵測遂親赴山丹相機防禦不料痰火上蒸倐忽暈潰精神飛越語言紊亂臣之微命諒亦只在須臾伏念臣沐寵眷有加無已身封侯爵子列卿班加以宫保之銜豫以世襲之職人臣遭際至此為極夫復何求獨是臣叨國家豢養之恩在武臣中最為深厚涓埃未報一旦就木未免生有餘辜死多遺憾耳因伏枕思維三秦為天險之國而三鎮尤屬邊外之衝地接番彞夙難控制撫之以恩而生玩加之以威而積怨其間調劑之術甚費苦心所設營堡雖云星羅碁布然補授將辨必須人地相宜方於邊防有賴臣死之後所遺員缺非得膽識兼優精明強幹者恐不足以資彈壓但知臣莫如主以皇上聖明自應遴選得人又無庸臣之鰓鰓過計至于臣男張雲翼幼讀儒書稍明大義今現任文職合無懇請聖恩卑之侯爵寄以封疆使其殫忠竭誠為國勤勞猶可以效臣未畢之力也臣今病篤如此萬無生機轉盼即填溝壑斷不能重覩堯天再瞻舜日望皇上勿復念臣所願治益求治安愈求安鞏皇圖于有永綿帝厯于無疆臣雖死亦瞑目于地下矣此臣刻骨鏤心之語如鳥哀鳴故于臨終之際遙望九重依戀莫捨不覺言之無已也伏乞皇上睿鑒施行康熙二十三年四月十三日奏奉旨該部知道欽此查張雲翼係文職該將軍所請寄以封疆使其殫忠竭誠為國勤勞之處應無庸議奉旨依議附甘寧巡撫葉原題疏題為申報將軍侯病故事康熙二十三年四月十八日亥時據靖逆侯將軍標下中軍副將兼管中營事黃燕贊等呈稱竊照靖逆侯張將軍前于三月二十八日因報彞情前赴山丹于四月十四日蒙令牌將卑職調赴山丹見本將軍侯病勢奄弱當有跟隨本將軍侯標員人等口稱本將軍侯于昨日亥時忽然昏迷不省人事周時始復蘇醒云本爵病殊危篤要回甘州調理可留後營守備張自立并兵五百名協防山丹等語遂用臥轎于本日晚回甘後次日早又據跟隨人等口稱將軍侯令囑卑職云本爵昨日調爾前赴山丹專為酌量撥兵協防今本爵既回已經留兵山丹但本爵受朝廷四十餘年厚恩未嘗報效不料舊病又發日重一日爾及諸將辨等各當盡忠報國以體本爵之心等語本將軍侯遂于本月十五日申時身故理合具報等情同時又據黃燕贊等呈為請準輿情暫有統轄以安內外事竊照甘州孤懸一線南北皆邊從來重地必得大帥彈壓庶得內外晏安今靖逆將軍侯一旦棄世軍民惶惑且彞情出沒無常今甘肅孫總鎮切近鄰疆且地方俱係統轄合無懇請憲臺垂念邊疆重地俯準輿情移文甘肅總鎮赴甘暫行統轄則邊疆幸甚軍民幸甚等情到臣該臣看得靖逆將軍侯張勇駐鎮邊疆彈壓番彞盡心報國已非一日矣今據該將軍侯標下中軍副將黃燕贊呈報該將軍侯于三月二十八日因報彞情前赴山丹忽然昏迷不省人事于四月十四日晚回甘十五日申時病故等情到臣除該將軍印信一應兵馬事宜或照該將軍侯原文令中軍副將黃燕贊暫行護理或令甘肅鎮臣孫思克星馳赴甘暫行料理臣當即移咨督臣希福星速酌奪外所有該將軍侯病故日期理合具疏題報但查該將軍侯臣張勇原因麥力幹台吉口稱養病暫住于黃城兒灘地方撫慰不去因而該將軍侯親赴山丹防禦患病身故相應具題伏乞皇上睿鑒勑部迅賜議覆施行康熙二十三年四月十九日題奉旨張勇韜鈐素裕殫心盡職久鎮巖疆勦禦賊冦固守地方籌畫周詳勞績懋著邊防戎務倚任方殷奄逝忽聞朕心深為軫惻應得恩恤著從優議奏該部知道欽此查將軍侯張勇久鎮巖疆勦禦賊冦固守地方勞績懋著理應優恤將軍侯張勇係少傅兼太子太師應否加宫保銜之處伏候上裁其祭葬應交禮工二部從優議覆其甘肅提督事務令總兵孫思克速赴甘州暫行署理甘肅總兵官事務移咨該督遴委賢能官員署理可也奉旨張勇著加贈少師仍兼太子太師餘依議跋先襄壯受兩朝寵命司封疆者四十年其間為戰為守悉歸本廟謨不敢少自為功此固久在宸鑒中惟是具沐恩榮彌懷奮勉乃殫忠未畢竟齎志以歿則不肖雲翼所應悲溯而不能自已焉其初定甘涼取滇黔姑遠不具述近憶逆臣變亂河東之役深荷主知事權既隆感勵愈至有所籌畫有所攻剿固皆請而後行然非主上任之重信之専則或不得遂效於疆場而盡尺寸之勞宜先襄壯之悉歸功於朝廷也獨念不肖雲翼幼隨南徼長侍西陲後雖列在卿班暫離子舍而所習見習聞其生平致身報國稜稜不可奪之氣根於至性發於行事形於章奏者一皆無所緣飾則存其疏又無不可即其事而知其心海國波恬署齋晝靜不肖雲翼恆焚香敬讀之因擇其至要者止彚一百二十疏以付之梓起自甘肅奏謝紀受世祖章皇帝簡畀之始也其後自陳有疏條議有疏報捷有疏題補有疏乞休有疏並歷受皇上殊恩異數皆謝有疏然多在行陳間或倥偬之際詞皆質直而居恆亦謂告君之體宜切而勿蔓顯而勿晦核而勿迂故所草者止取口如其心筆如其口而忠君愛國已自盡抒其肝膈不肖雲翼每讀至臨終泣陳一疏誠懇切至盡見生平而獨不能已於悲溯者則以其殫忠未畢竟齎志以歿耳今不肖雲翼仰承天寵亦復列爵守土將何以矢報於國者即無沗於家耶梓既竣因撮其巔末恭書於後並自警勵云爾時康熙三十三年嵗次甲戌八月十二日不肖男雲翼百拜敬書於溫陵署中張襄壯奏疏卷六
