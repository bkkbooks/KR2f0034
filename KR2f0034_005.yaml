body:
  text: 張襄壯奏疏卷五甘肅提督靖逆侯張勇撰靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹密題為照額設兵并補守備以資防禦事竊照逆賊倡亂淪陷階文臣前題准將階州副將改為洮岷副將而副將營原設兵馬曩因軍需尚詘故未經照額募補唯以洮岷參將營額兵五百并副將楊朝梁不食糧餉之土兵五百充伍凑合副將營制以為權宜之計今楊朝梁已經休致土兵五百隨行帶回而洮岷副將營止存兵五百名今階文見議歸誠臣擬遣兵前去安撫而分布實苦不敷查階州額設馬戰兵三百名步戰兵四百名守兵三百名文縣守備營馬戰兵五十名步戰兵一百五十名守兵二百名西固城守兵一百一十名則洮岷協營兵數當凖階協舊制而文縣西固亦應照原額募補庶可以分防各隘戰守有資矣再照西固城原設守備一員今地方恢復急需能員查得河州營把總杜道隆調征一年有餘屢著戰功且膂力超衆才技兼人堪以擬用西固城守備除臣一面行令洮岷副將吕天玉階州遊擊吳掇桂文縣守備馬任逺并委把總杜道隆各速行召募外謹㑹同督臣哈占甘撫臣華善提臣王進寶合詞具題伏乞皇上睿鑒敕部議覆施行康熙十五年七月二十五日題奉㫖兵部知道欽此查階州副將營原額馬步兵一千名先經該將軍題准將洮岷參將改為副將添兵五百名階州副將改為遊擊裁去兵四百名其洮岷營應添兵五百名即以楊朝梁自養土兵充額不費糧餉暫行守禦地方今該將軍既稱楊朝梁土兵五百已經帶回洮岷營兵數當凖階協舊制并文縣西固亦應照原額募補可以分防各隘戰守有資等語均應照該將軍所題杜道隆係把總不應越升守備該將軍既稱杜道隆調征一年屢著戰功等語應准升以署守備管陜西西寧西固城守備事可也奉㫖依議靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹題為恭報暫停召募以省兵餉事竊照召募興漢二鎮屬原額新設官兵共計一萬六千有餘今臣已募有八千四百餘名又督臣先經募過漢鳳兩郡及舊縣關地方二營兵共一千一十五名漢中鎮臣費雅達募兵一千一百餘名共募兵一萬五百餘名未募之兵尚少五千餘名臣因前赴秦州與撫逺大將軍㑹商機務并酌議興漢二鎮所有召募未足之兵應行停止蓋逆賊已經逃遁則二鎮所屬各營地方可以節次恢復俟到彼時即將恢復之兵選充原額既可省先支之餉復可免召募之煩臣遂移行各標營將見在已募之兵收伍操練其未募之兵飭令暫停去後所有新兵應需旗幟已經製造將完馬匹亦已領配二千八百匹唯所需盔甲器械等項俟臣抵蘭後將見募之兵分定馬步戰守額數督造報竣分給配用之日造冊報部理合題明伏乞皇上睿鑒敕部議覆施行康熙十五年九月十三日題奉㫖兵部知道欽此查該將軍侯既稱興漢二鎮屬未募之兵尚少五千餘名臣與撫逺大將軍㑹商俟各營路地方恢復即將恢復之兵選充原額可省金錢應暫停止等語應如該將軍侯所題將興漢二鎮屬未募兵五千餘名停其召募可也奉㫖依議靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙十五年九月二十日准兵部咨為欽奉上諭事該議政王等㑹題前事內開康熙十五年八月二十日奉上諭諭兵部自逆賊煽亂以來奸徒附和侵擾地方關隴以西疆域遼濶大兵一時未集人心不無動搖靖逆將軍靖逆侯張勇提督王進寶鎮臣孫思克一聞蘭州之變即統領兵馬星馳渡河勦殺賊衆攻圍蘭州臨鞏等處恢復城池條奏機宜舉發僞劄拿獲奸細綏靖邊陲其功甚大及大兵攻取平凉專任靖逆侯張勇等鎮守秦鞏復殫心籌畫調度合宜勦禦川賊屢奏捷音紓朕西顧之憂厥功尤為茂著伊等皆夙將重臣矢志報國同心協力展布謀猷兼以訓練士卒忠義素孚故能身先行陳所向克捷其屬下官員兵丁亦皆效力共建功績朕甚嘉之于軍功議叙之外應從優加恩以示朕奬勵忠貞酬答勳勞至意著議政王貝勒大臣㑹同議奏特諭欽此該臣等㑹議得上諭內靖逆將軍靖逆侯張勇提督王進寶鎮臣孫思克攻圍蘭州臨鞏等處恢復城池綏靖邊陲其功甚大復殫心籌畫調度合宜紓朕西顧之憂厥功尤為茂著伊等皆夙將重臣矢志報國忠義素孚其屬下官員兵丁亦皆效力共建功績朕甚嘉之于軍功議叙之外應從優加恩以示朕酬答勳勞至意欽此除將軍侯張勇提督王進寶鎮臣孫思克于軍功議叙外其靖逆將軍侯張勇係三等侯今優加以拖沙喇哈畨授為二等侯提督王進寶冊開係阿思哈尼哈畨今優升為二等阿思哈尼哈畨給與將軍名色仍兼管平凉等處提督事務查鎮臣孫思克無世職今優授為三等阿達哈哈畨授為凉州提督仍聽靖逆將軍侯張勇節制至給與王進寶將軍名色之處交與內閣其張勇添撰敕書及王進寶孫思克換給敕印之處交與內閣吏部禮部可也等因康熙十五年八月二十三日題奉㫖張勇王進寶孫思克勦禦賊寇功著巖疆矢志忠貞克副倚任張勇著從優加為一等侯王進寶著優升為一等阿思哈尼哈畨授為將軍仍兼管平凉等處提督事務孫思克著優升為一等阿達哈哈畨凉州提督餘依議欽此欽遵備咨到臣准此竊自吳三桂變亂以來三秦擾動臣所屬河東臨鞏等處悉遭淪陷皇上不加譴斥俾得戴罪恢復仰叨寬典已出望外且荷特恩加臣將軍之職畀以事權用資彈壓及吳逆投送僞劄臣即繳部具疏首報復䝉恩㫖賜爵通侯臣自維才薄叠膺寵遇乃濫竽名器實夙夜抱慙今臨鞏各地方雖節次克復然失而復得功不掩過况川逆現在盤踞勦禦方殷臣恨不能滅此朝食以抒廟堂西顧之懷何敢復因擾攘屢捧絲綸茲又欽奉上諭加臣一等侯爵拜命之下深切惶悚臣有何功而過沐湛恩有加無已此誠古來將臣所不易得之數庸劣如臣竊叨曠典不禁感泣失聲愈自奮激從此秣馬礪兵務期妖氛立靖以仰報髙厚於萬一耳除臣恭設香案望闕叩頭謝恩訖為此理合具奏伏乞皇上睿鑒施行康熙十五年九月二十七日奏奉㫖覽卿奏謝知道了該部知道靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹題為彚報傷亡官兵懇乞循例恤賞以廣皇仁以鼓士氣事案照河西自去嵗用兵以來衝鋒撼陳者屢矣其間克捷獲勝將士實與有力似當一體仰邀恩恤况披堅執鋭奮不顧身以致或傷或亡其忠魂廢體尤宜倍加憐憫者也查官有戰功兵有傷亡者業經照案題報奉有事平議叙之㫖臣隨將行間有功人員造冊送部議敘外唯前後對敵傷亡各兵未䝉議恤臣思疆場殞命者家失所依肢體殘缺者身屬無用苦况莫告魂魄哀號每一念及為之痛心茲奉大典恤賞下頒則此傷亡官兵相應循例優恤以勵人心者耳今臣准據甘寧撫臣華善奮威將軍王進寶凉州提臣孫思克臣標中軍副將劉選勝各將所屬標營節次殺賊官兵開列對陳身亡日期并被傷處所分别輕重彚造清冊前來除將原冊送部外臣謹合詞具題伏乞皇上睿鑒敕部議覆施行康熙十五年十一月十七日題奉㫖兵部議奏欽此除陳亡官員已經議給恩恤應無庸再議外今該將軍侯張勇既稱傷亡官兵似宜循例優恤等語其被傷官兵陳亡兵丁應聽該將軍侯照例賞恤仍造冊報部可也奉㫖依議靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹題為軍需孔亟殫力捐資以報國恩事竊自叛逆變亂以來警息頻聞所在淪陷雖天威逺播釡底遊魂不久殱滅然轉輸糧餉購買馬匹製造甲械賞賚將士糜費內帑之金錢亦已不資矣臣一介武夫每聞古人家散萬金之語恨不能追蹤往蹟以報兩朝知遇之恩去嵗河東告變臣統師撻伐用彰天討唯是軍前所需用度浩繁司農方在持籌而計臣子敢萌身家之念故臣不憚傾囊倒篋多方拮据隨事補苴務期士飽馬騰軍容整肅兵心踴躍以奏剋期蕩平之績并以少盡破家為國之心也案查糧糈為用兵急務臣慮蘭州殘破之後井里蕭條兵馬到蘭未免倉皇措餉臣待罪河西二十餘載其蓄藏糧米之家聞之頗稔遂於甘州永昌莊浪等處勸諭積儲人戶常時泰張大噪等一千二百七十四家借出現糧三萬四百五十七石照時價給發銀兩在甘州者交甘州道㕔在永莊者交凉莊道㕔并移㑹甘撫臣華善轉檄各道㕔衛親行下鄉催運至蘭而蘭州各標營兵食始克有濟此臣捐資辦餉業經甘寧撫臣華善題報在案又逆賊鴟張六郡失陷雖王師四出所至克復而追奔逐北非馬莫資又况對壘相持馳驅靡息晝夜奔勞倒斃者衆臣隨㑹知甘撫臣華善於十四年內捐銀一萬一千餘兩在西寧莊浪甘凉肅州産馬處所陸續購馬一千三百餘匹并覔買草料喂飼嗣因倒馬過多又於十五年內捐銀一萬四千五百餘兩購馬一千七百餘匹前後共捐過銀二萬五千七百兩買馬三千二百匹征勦臨蘭鞏秦以及伏羌西和樂門通渭馬塢等處計今兩載有一兵倒馬十匹或七八匹五六匹不等隨倒隨給故戰馬賴以不缺此甘撫臣華善所目擊者又臣標營制新設所有配兵藍布盔甲率多督鎮撥給歷年已久類皆損敝似難以壯軍威臣自渡河以來捐資改製雜色緞面盔甲一千頂副用過銀八千餘兩故四處征勦軍裝明亮有先聲奪人之勢此亦甘撫臣華善所目擊者又臣駐劄伏羌堵截秦州逆賊時大兵赴勦樂門當有樂門鄉民數千齊奔伏羌涕泣稟稱麥豆榖稻青苗俱被大兵馬匹踐食等情臣隨令臣標中軍副將劉選勝伏羌知縣張吉捷查勘回稱兩山悉係賊兵屯劄大兵馬匹無處放牧不得已作此權宜之計臣即與百姓估買公議定價每青苗一畝給銀三錢東至西寧鎮西至樂門鎮一帶青苗共給過銀三千六百四十兩以牧養滿漢官兵馬匹此都統臣黑葉副都統臣奚福所共知者又王輔臣原遣僞總兵李國梁李師膺帶兵二千前去秦州接應僞將軍王屏藩赴援平凉而李國梁甫至樂門王輔臣見援兵不至已率平慶固原等處投誠臣即㑹同都統臣黑葉提臣王進寶遣人頒諭李國梁等回兵李國梁接諭遂于十五年六月二十四日二更起營飛回平凉川逆知失所恃亦於次晚棄營奔遁臣恐官兵追勦道路多被挖掘因思大路有一髙橋若為賊拆斷而我追兵不能飛渡隨遣後營遊擊劉虎功加參將武自成等帶兵一千餘名鳥鎗五百名每兵賞銀四錢官三員各賞銀三十兩共賞銀六百九十餘兩以示鼓舞令各官兵乘夜步行星速到彼防護勿致有誤軍機去後嗣據劉虎等禀稱卑職於四更時候俱到髙橋賊於五更欲來拆毁見我兵防守不敢進前等語而髙橋賴以不斷追勦之兵始不至望洋興歎矣計臣前後所捐銀兩職分宜然何敢瑣䙝上陳致瀆天聽惟是改造盔甲措購馬匹計運糧餉防護河梁悉關緊急軍務故臣勉力捐資以少佐征勦之用者耳謹具本報明伏乞皇上睿鑒施行康熙十五年十一月二十九日題奉㫖覽卿奏捐資買馬製造盔甲給賞兵丁具見急公可嘉著議叙具奏兵部知道欽此查見今各省捐助盔甲器械等項俱照捐助袍帽之例議叙五百兩以上准加一級如有多者照此加級今靖逆將軍侯張勇於用兵之際審度時勢緊急捐資買馬製造盔甲給賞兵丁相應照例議叙但該將軍侯張勇前後共捐銀三萬八千餘兩所捐銀數甚多查張勇見係靖逆將軍一等侯少保兼太子太保侯爵無照例可加之級應否加宫保銜伏候上裁奉㫖張勇著加少傅兼太子太傅靖逆侯靖逆將軍少傅兼太子太傅管甘肅提督事務臣張勇謹奏為臣病已危萬難供職特舉賢能懇允代任無誤巖疆事案照先為微臣病勢日危等事臣業已具疏乞休隨奉有秦省軍務方殷正資料理不必以疾求罷之㫖臣不覺感激涕零自念君恩深厚如此祇恐廢病有誤付託此外又何計焉故自駐蘭以來延醫診治冀獲稍痊俾得以未盡之餘年竭蹶圖報不料病勢日見危篤藥餌毫無效驗於二月中旬兩手俱腫至輕莫舉又於足面受傷之旁陡發擁腫詢之醫者皆云箭中有毒年久移注之故又兼痰火上蒸氣喘咳逆飲食漸減形體尫羸曩尚賴人扶上肩輿今竟仰卧牀褥一加扶掖則百痛交作是臣雖一息尚存亦不過奄奄待斃而已伏思臣以一介武夫遭逢聖世分符專閫位列通侯死何足惜但受兩朝寵眷之隆不能為國討賊盡掃妖氛裹革還葬少效涓埃此不無遺憾耳目今諸寇奔遁秦省雖安然臣所轄地方悉屬衝險倘控制不得其人隱憂靡細臣今命若懸絲危在旦暮料難尸素查凉州提臣孫思克韜略夙裕膽智兼優且在邊日久曉暢情形素為畨彞所畏服以之代臣甘肅提督綽有餘裕矣至於甘肅鎮缺查永昌副將達爾護謀猷久著諳熟兵機自受職以來實心任事靡有懈弛如前嵗臣與二鎮統兵征勦該副將留守河西時則警報頻聞羽書旁午獨能防禦嚴密疆土賴以無虞洵為已試之明驗也泣懇皇上俯憐臣病已入膏肓甘肅為秦重地特降俞㫖將提臣孫思克代臣員缺以副將達爾護補鎮庶可朝拜命而夕赴任巖疆大有攸賴矣此臣如鳥哀鳴思欲以人事君故不避嫌特舉所知臣無任懇切惶悚待命之至為此具本謹奏請㫖康熙十六年三月十九日奏奉㫖卿長才偉略久鎮巖疆矢志忠貞勞績懋著地方雖經底定正資料理著勉加調攝益殫壯猷以副朕委任至意不必以疾求罷該部知道靖逆侯靖逆將軍少傅兼太子太傅管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙十六年四月十二日准兵部咨為請㫖事內開該臣等㑹議得靖逆將軍張勇授為一等侯奮威將軍王進寶授為一等阿思哈尼哈畨並未議及世職幾次之處查海澄公黃梧准襲十二次伯周全斌准襲一次等語今靖逆將軍侯張勇奮威將軍王進寶等圍攻蘭州臨鞏等處恢復城池著有功績相應將張勇一等侯准襲十次王進寶一等阿思哈尼哈畨准襲八次俟命下之日交與吏部轉揭內閣撰給敕書可也等因奉㫖依議欽此欽遵備咨到臣准此竊照録勩紀勛雖為國家之巨典而光前裕後尤屬臣子之殊榮臣以微勞謬膺侯爵晉崇階於五等軍旅兼司叨異數于九重恩施屢渥固已澤流閫外歡徹師中者也乃於城池恢復之時更議襲職相承之數以帶礪綿夫十世聿騰遞及之輝知河山奠於萬年彌永賞延之慶但愧無功受寵實深濫竽名器之慚所望有子克家庶幾少效涓埃之報從此生生世世長懷雨露之恩行見子子孫孫共凜絲綸之重者矣除臣恭設香案望闕叩頭謝恩外理合具奏伏乞皇上睿鑒施行康熙十六年四月二十九日奏奉㫖覽卿奏謝知道了該部知道靖逆侯靖逆將軍少傅兼太子太傅管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙十六年七月十五日接臣男大理寺少卿臣張雲翼家報內稱六月二十六日䝉太皇太后命內使戛爾兔到家口傳懿㫖問男母併男兄弟賜瓜果二十籃男叩頭謝恩祇領訖等情臣聞報感悚踧踖靡寧恭惟太皇太后啓先皇帝以成耆定之勳復同皇上共致太平之治薄海內外靡不瞻仰徽音臣以一介武夫受知兩朝恩遇優渥茲得賜第京師近依輦轂固已榮逾望外乃荷聖慈俯念微臣妻子恩賜瓜果臣鏤心志感揣分難安喜降慈廷溫語恩同霄漢之髙欣逢中使傳頒香奪蓬萊之氣此皆皇上眷顧有加是以太皇太后寵賚獨厚臣緣逺任邊陲弗克趨叩闕下惟有北望感忭遙祝椒闈無疆之壽耳臣謹恭設香案望闕叩頭謝恩訖為此理合具奏伏乞皇上睿鑒施行康熙十六年七月二十五日奏奉㫖覽卿奏謝知道了該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙十六年十一月二十八日准兵部咨為欽奉上諭事內開奉㫖張勇著以少傅兼太子太師餘依議欽此并發到議叙過臣標及各標營將辨加銜劄付到臣臣即率領各官恭設香案望闕叩頭謝恩訖竊臣以殘廢之軀屢荷皇恩覃及即肝腦塗地實難報稱而征勦各處賊寇恢復地方雖各將士之用命皆賴我皇上之神謨也今䝉特恩加臣太子太師臣標屬員俱䝉優叙加銜拜命之下偏裨踊躍以歡呼士卒激勵而鼓舞唯願早靖妖氛仰舒宵旰臣等自當各殫忠誠共勉厥職以少酬髙厚于萬一耳謹具奏聞康熙十六年十二月十二日奏奉㫖覽卿奏謝知道了該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為兵分五路進取漢興以圖大舉入川事竊自吳逆背叛以來我兵屢挫其鋒以大勢觀之賊亦不久自潰矣但逆賊目下以川蜀為巢穴以漢興為藩籬進戰退守全在於此我必破其藩籬始能入其巢穴故今日欲為入川計不得不亟取漢興也聞撫逺大將軍公圖海有分兵二路攻取漢興之疏在大將軍雖自有見然以臣愚慮蜀道險阻所在遼濶兩路分兵未免單薄蓋兵有不得不合者合之則敵有望風披靡之勢兵亦有不得不分者分之則敵有應接不暇之勞今欲取漢興非由五路進兵不可所謂五路者欲取興安不得不分兵為二路而出也查鄖襄西連洵陽應將鄖襄官兵并去嵗平羅參將全卿王珍李師膺等領赴湖廣三千之兵或鄖撫或鄖提率領此一路前抵洵陽再將陜西一路官兵命將統率由商州南抵洵陽有此兩路兵馬俱㑹集于洵陽一齊進取興安如摧枯拉朽矣其次欲取漢中不得不分兵為三路而出也查黑水峪一路出接洋漢可至漢中之東又連雲棧一路可至漢中之北又略陽一路接連沔縣可至漢中之西此三路官兵訂期齊進以取漢中亦如風行草偃矣然後以五路之進發分逆賊之兵勢或突其前或襲其後或攻其腹心或擊其左右使賊四面受敵倉皇失措各思敗遁內變自作於是大舉破蜀可一鼓而下也若慮糧芻難繼則臣有官兵齊集漢興等事一疏暫且駐守亦養鋭待時之一策應否可行臣未敢擅便理合題請伏乞皇上睿鑒敕部議覆施行康熙十七年三月初三日題奉㫖議政王貝勒大臣㑹議具奏欽此查陜西滿洲緑旗大兵分為兩路進取漢中興安已經㑹同撫逺大將軍公圖海具題相應將將軍侯張勇所題無容另議奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為官兵齊集漢興秦省轉運莫繼宜駐商州西和隘口以豁民纍事准撫逺大將軍公臣圖海咨准兵部咨為進取漢興事奉㫖議政王貝勒大臣㑹議具奏欽此㑹議得征勦逆賊固守陜西之處既已倚任大將軍公圖海及將軍侯張勇等其作何留守官兵以期陜西無虞作何統領官兵征勦逆賊進取漢興等處應聽大將軍公圖海將軍侯張勇等公同確商酌量而行至於秦省滿漢官兵為數不少所稱留守大兵似屬單薄之處毋容議等因康熙十七年二月十八日題本日奉㫖依議速行欽此欽遵備咨到本大將軍准此合咨貴將軍侯煩為查照奉㫖內事理詳細妥議速覆等因移咨到臣准此業將臣宜移駐莊浪適中之地以彈壓三邊并戰守一切事宜既經大將軍籌畫允當相應仍照前議進取漢興等緣由咨覆在案但臣細思目下兵馬四集克取漢興雖指日可待而既克之後必將乘勝破蜀查川蜀層巒叠嶂賊已踞為窠穴所有險路懸橋必皆毁拆以為固守之計兼以地多瘴癘暑濕薰蒸以大勢觀之似難速進不得不將三邊進征之兵分防各口獨是調征兵馬幾及五萬有竒曠日持久盡駐漢興恐漢興殘破之後糧芻必無所出計唯有責令陜西七府挽運以濟兵食但秦民三載叠遭兵燹家室流離顛連萬狀今若再有運濟之纍行見逃亡死徙貽誤軍需誠靡細也莫若止守商州迤西西和迤東各隘口令滿洲緑旗等官兵暫且就食本處然後相機入川則可省險道之轉輸即以培閭閻之元氣所全實大矣臣為國計民生起見應否可行仰祈皇上睿鑒敕部議覆施行康熙十七年三月初三日題奉㫖議政王貝勒大臣㑹議具奏欽此查已於將軍侯張勇五路進攻川蜀可圖若慮糧芻難繼宜暫且駐守疏內議覆此疏無容另議奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為咨請就近題補邊堡守備以資防禦事康熙十七年三月初一日准凉州提臣孫思克咨稱寧逺彈丸小堡孤懸在北邊暗門以外專司哨探並無附近營堡可以應援且當昌寧湖與兔兒砂野馬川紅峴兒腰一帶邊外草地俱係哈兒罕套彞往來叵測之地堡小兵單最難防禦倘任用非人易為邊患今原任守備孫傳臚積勞病故所遺員缺應宜靜候部推本提督何敢妄行請補但邊疆與內地不同現今海彞恣肆遊牧靡常驅逐不從抗違如故非得熟識邊情深曉地利恐難勝任斯職查得本標右營功加都司僉書管千總事任鳳翔歷任邊營膽略素裕才技優長且定例千總歷俸已滿六年者例應升遷今本官現任千總歷俸既深亦應升以守備員缺况效力年久勤勞素著連年出征屢立戰功見䝉恩加都司僉書正合推補守備員缺合無咨請將任鳳翔題補寧逺堡守備人地既已相宜銜缺又復相當循例保結咨請查照題補等因到臣准此該臣看得寧逺堡設在北邊之外最為險要必須熟識邊情素練行陳者方克勝任今該提臣既以歷俸年深征勦著功久事邊陲人地相宜之功加都司僉書管千總事任鳳翔請補該堡守備循例具結保舉前來除印結履歷冊送部外臣謹㑹同督臣哈占甘撫臣鄂善提臣孫思克合詞具題伏乞皇上睿鑒敕部議覆施行康熙十七年閏三月初三日題奉㫖兵部議奏欽此查千總任鳳翔該提督保舉且寧逺堡設在邊外應如該將軍所題准補守備可也奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為衝邊亟需能員循例就近請補以衛疆圉事竊照甘肅安逺營參將霍嵤患病身故除另疏題報外所遺員缺應候部推但安逺設在衝邊逼近可可口南臨海彞北連套彞兼以土畨環居其中控制殊難非得深知地利膽智兼優人地相宜之員不克勝任斯職查臣標後營遊擊劉虎才堪御衆智能悉邊且連年征勦果敢先登有軍功紀録二次堪以補用安逺參將其所遺後營遊擊員缺選得本營中軍守備孫應宰沈毅有謀兵機諳熟有軍功紀録一次堪以補用其後營中軍守備員缺查得功加署參將王友資謀略夙裕戰功屢著有軍功紀録二次且奉有遇缺即用之㫖堪以補授以上三員臣緣地擇人因才補缺相應循例出具印結請補除將各辨履歷備造清冊并印結送部外臣謹㑹同督臣哈占合詞具題伏乞皇上睿鑒敕部議覆施行康熙十七年閏三月十五日題奉㫖兵部議奏欽此查遊擊劉虎等既經該將軍侯保題且安逺地方又設在衝邊非腹裏可比應如所題奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為極邊需員最亟特舉才能補授以重邊防事竊照嘉峪關遊擊劉大明因病辭職業經另疏題報外所遺員缺應候部推但嘉峪關為極邊要地非得才略素優堪資守禦者恐難稱職臣看得標下隨征功加副將武自成狀貌魁梧膽智充裕兼以攻克臨洮首先登城恢復蘭鞏前驅效命現有軍功紀録一次并奉㫖遇缺補用授以嘉峪關遊擊洵為人地相宜銜缺相當用資固圉而邊防大有攸賴矣臣循邊地用人之例出具保結題請除保結履歷送部外謹㑹同撫臣華善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十七年六月二十二日題奉㫖兵部議奏欽此查武自成原係甘肅提標前營千總功加署副將有軍功紀録一次留標效用遇缺補授今該將軍既稱嘉峪關設在極邊將武自成保題前來應如所題奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為巖疆亟需才能將備請乞就近題補以固邊疆事康熙十七年七月二十六日准凉州提臣孫思克咨稱邊疆與內地不同而城守與各營復别查甘州參將一缺內則捍衛城池戢和兵民外則把守關隘防禦畨彞并一切修理器械製造火藥巡邏偵探捕緝奸宄稽查斥堠皆其所司責任綦重况兼轄梨園暖泉與夫東古城磁窰口太平堡等處時防海彞出沒較之别處邊營尤為衝險必得明敏練達熟知地勢夙諳畨彞情形者方克勝任今原任參將王履吉既以老病告辭所遺員缺刻難乏人恐部推一時未到即或到任而邊方形勢未必周知爾時始議題請更換則一往一來不無耽延時日且目今用兵之際尤宜擇人以資勦禦者也今查有功加署副將現任髙古城遊擊牛一麟老成練達材技優長生長邊方深知地利堪以肩茲重任又連年隨征河東屢立戰功以軍功八等䝉恩加升署副將職銜尚餘軍功紀録二次合無即以署副將職銜就近請補甘州城守營參將則銜缺相當人地相宜用資守禦誠可以收其後效也至牛一麟倘荷准補其所遺員缺查得功加署副將管標下後營中軍守備事余啓膽智兼優堪資戰守且歷俸年深屢立戰功亦以軍功八等加署副將職銜合無請補髙古城遊擊員缺則前功足紀後效方新行見戮力疆場未有不感激思奮者也至所遺守備員缺看得功加署副將管標下後營千總事李士達英年鋭志膂力方剛隨征用命屢著勞績見有軍功九等加升署副將職銜合無請補後營守備員缺以上三員皆隨標年久四處征勦爭先撼陳奮不顧身其才技智謀悉堪任用相應循例出具保結咨請查照具題請補施行等因到臣准此該臣看得甘州城守一缺地處衝邊必須才力兼優之員方堪理繁治劇有裨邊務今提臣以功加署副將髙古城遊擊牛一麟生長邊陲熟知形勢又河東征勦屢建戰功堪以補用其髙古城遊擊員缺以提標署副將管後營守備事余啓技略超羣戰守堪資曽屢立戰功歷俸亦久堪以補用其後營守備員缺以署副將管後營千總事李士達年力方剛戰陳敢先堪以補用查以上三辨俱為人地相宜屢著戰功之員既經提臣循例出具印結保舉前來臣謹㑹同提臣孫思克合詞具題伏乞皇上睿鑒敕部議覆施行康熙十七年七月二十八日題奉㫖兵部議奏欽此查遊擊牛一麟守備余啓千總李士達既經該提督以熟知邊情技略超羣保舉且甘州等處俱係衝邊地方應如該將軍所題可也奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為循例保舉補授將辨以重巖疆事康熙十七年十一月初四日准提臣趙良棟咨開案照中衛營副將賴塔病故緣由業已咨報候題在案查中衛乃寧夏之極邊距鎮三百餘里西界凉莊南臨蘭鞏內則香山各水頭山野民愚素稱難治外則營盤長流五塊一帶為河西䝉古出沒之地該營副將必須才智優長恩信孚人者方克勝任今提標中軍參將趙彞鼎任事勤敏堪寄一方雖中軍為五營八路首領兵馬錢糧總司應難輕調緣係本提督之姪不便久任合無仍以原銜調補中衛實為人缺相宜其所遺中軍參將員缺查後營遊擊胡攀桂英年壯志遇事敢為不獨奮力著有戰功抑且實心䖍共厥職合無仍以遊擊職銜調補中軍兼管中營參將事至中營守備師帝賔智識過人膽略軼衆前隨本提督單騎抵寧撫安地方收拾人心不負委任動合機宜勞不可泯合無量加職銜升補後營遊擊更隨征還職守備髙允焯勤勞日久立有戰功且係部覆遇缺補用之員合無請補中營守備以上四員本提督原從巖疆要地需人起見遵例具結保請伏乞本爵俯賜具題等因到臣准此該臣看得寧夏中衛副將賴塔因病身故除另疏題報外所遺員缺查中衛設在極邊為寧夏西陲重地必得才能素著之員始有裨于地方今准提臣以提標中營參將趙彞鼎調補中衛副將即以後營遊擊胡攀桂擬補提標中營參將復以中營守備師帝賔擬補後營遊擊以隨征遇缺補用守備髙允焯擬補中營守備臣查各辨才悉堪用既經提臣循例具結保舉前來除將各結送部外臣謹㑹同撫臣鄂善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十七年十一月十一日題奉㫖兵部議奏欽此查參將趙彞鼎遊擊胡攀桂俱歷俸未經年滿師帝賔係署守備管守備事如補遊擊似屬過優但中衛寧夏係邊地且該提督既將趙彞鼎等保舉該將軍具題應照例補授可也奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為邊堡重地特舉能員以固疆圉事竊照西寧保安堡守備王拱斗因患病辭職業經另疏具題外所遺員缺關係衝邊難以久懸查保安堡設在境外孤立之地畨彞環居最難控馭非才能素著熟諳邊情之員難以任用選得阿營千總張得祿才能練達久任邊營屢從征戰著有勞績且歷俸九年有餘以之補用保安堡守備洵為人地相宜可資實用者也緣係選補要地能員除循例出具保結送部外臣謹㑹同撫臣鄂善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十七年十一月十一日題奉㫖兵部議奏欽此查該將軍侯張勇既稱千總張得祿才能歷練保題補授保安堡守備應如所題可也奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為彞情叵測邊地兵單請暫設總鎮以重控制事竊照套彞噶爾旦與海上䝉古雖有結親之好然世為仇敵未必始終不渝萬一有西海之爭兩彞自相攻擊則我內地恐難警息無聞所有隄防堵禦之策應於未雨綢繆查甘肅兵力單薄兼以連嵗四出征勦兵疲馬敝若不預為籌畫以致倉皇失措貽誤封疆誠靡細也况今逆氛未靖臣現統兵前赴鞏秦鞭長莫及顧此失彼更不得不鰓鰓是慮者耳合無將肅州協營改為城守營再設總兵官一員添兵三千照馬三步七之例設立三營蓋肅州窮邊極險為二彞往來道路有此一鎮官兵以資控禦則進戰退守均有攸賴也倘慮需餉浩繁或就興漢二鎮內酌調一鎮移駐肅州俟地方底定臣兵回汛之後再議裁撤仍舊分布庶彈壓有資而邊防得以鞏固矣應否可行臣未敢擅便為此理合題請伏乞皇上睿鑒敕部議覆施行康熙十七年十一月二十一日題奉㫖兵部議奏欽此查秦省增添官兵甚多今當需餉浩繁之際不便再添官兵該將軍所請改營設鎮添兵之處應無庸議撫逺大將軍公圖海等身在地方悉知緩急緊要與不緊要可否暫調一鎮統兵赴肅防守聽撫逺大將軍公圖海總督哈占將軍侯張勇公商酌行可也奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為秦省勦撫方殷重臣不便久離仰祈睿鑒迅敕還陜以安民心以濟軍務事案照臣准撫逺大將軍公臣圖海咨為移知事內開本大將軍具疏懇請入覲已䝉俞允今騎自備馬匹赴京陛見不日言旋所有留秦大兵業經奉㫖著建威將軍吳丹暫行統轄合咨貴將軍侯煩為查照嚴飭各汛官兵固守地方遇有軍機重務移㑹建威將軍商酌而行可也等因移咨到臣准此臣思陜西幅􅊷萬里古稱河山百二乃天險之地也兼以三邊衝要營堡孤懸守禦隄防尤刻難疏忽者自變亂以來警息頻聞烽煙未淨幸仗皇上知人善任特簡大學士圖海畀以西征之權託以閫外之寄而大學士臣用能仰體皇仁勦撫兼施故一戰而平凉歸誠川逆逺遁安民禦寇綱舉目張其幄算帷籌雖古名將何以加茲且開誠布公推心置腹俾一時文武各官人民軍士靡不深相悅服洵秦地長城也茲因久離天顔疏請陛見旋奉俞㫖仰見皇上憫念勞臣眷顧有加至意但陜西遭羣寇蹂躪之後民不堪命加以漢興負固現在酌議進兵所望重臣撫綏控制不啻援溺救焚懇乞皇上俯鑒三秦重地勦撫方殷速敕大將軍公圖海回陜庶人心鎮定釡息潛消疆圉軍民均有攸賴矣為此具本臣謹具題知康熙十八年正月二十七日題奉㫖已有㫖了該部知道靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為岷州地鄰賊境協將缺難久懸特舉能員以奠封疆事康熙十八年二月十六日准甘寧撫臣鄂善咨開康熙十八年二月十四日准貴爵咨開洮岷副將吕天玉病故委令本部院標下中軍遊擊嶽鎮邦署理緣由到部院准此查得洮岷現鄰賊地控制必須得人貴爵選擇嶽鎮邦署理誠為允當查嶽鎮邦在鞏昌及靜寧樂門等處勦賊屢立功績題報在案嗣准部覆議叙功次應加三等仍紀録一次合無以本官就近題補洮岷副將可為人地相宜所遺員缺查標下右營遊擊劉廷棟才技優長屢著戰功堪以調補所遺右營遊擊員缺查標下左營守備趙魁英殺賊有功業准議叙一等堪以補用其所遺員缺查原任雲貴督標中營守備劉虎才猷懋著堪以補用本部院循例出具印結并各辨履歷一併咨送煩請查照㑹題施行等因到臣該臣看得洮岷副將吕天玉病故員缺查岷州切近階逆日事堵勦又洮州設居畨族時殷防範必須謀略兼優聞望素著者庶能威懾賊氛彈壓畨族於以靖外安內也查撫標左營中軍遊擊嶽鎮邦沈謀有斷果敢爭先屢經戰陳奏捷居多以之補用洮岷副將實為人地相宜所遺撫標左營中軍遊擊員缺查右營遊擊劉廷棟才技兼優隨軍征勦著立戰功堪以調補所遺右營遊擊員缺查撫標左營中軍守備趙魁英才力軼衆勦賊著勞堪以補用所遺左營守備員缺查原任雲貴督標中營守備劉虎屢隨征勦勤勞日久堪以補用以上各辨原係臣揀拔題用悉知其才技優長今銜缺雖有未符于人地悉為相宜既經撫臣具結保舉前來臣亦出具印結併將各辨履歷送部外謹㑹同撫臣鄂善鎮臣朱衣客合詞具題伏乞皇上睿覽敕部議覆施行康熙十八年二月十九日題奉㫖兵部議奏欽此查該將軍侯既稱洮岷地方切近階逆設居畨族且嶽鎮邦等俱係才力優長保題等語均應如所題補授奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為巖疆急需能員擬補將備以資邊防事康熙十八年四月初四日准西寧鎮臣朱衣客咨開照得河州地處極邊逼鄰西彞撫綏彈壓實惟副將是賴今該營副將楊三元已經升任所遺員缺急需能員查鎮海參將劉忠久歷邊疆才識敏練堪以升補其鎮海參將員缺密邇海彞最屬險要查本鎮標下中軍遊擊汪溥狀貌魁梧謀略超邁以補鎮海參將殊稱人地相宜查前營遊擊米之順馭兵有術武藝超羣以之調補中軍遊擊員缺用資經理錢糧可無貽誤更查西寧城守都司楚名俊年力精壯才名出衆堪以升補前營遊擊員缺至於右營守備胡禎久歷營伍弓馬熟嫺堪以升補西寧城守都司員缺至於中營千總官斌壯年果敢騎射優長堪以升補右營守備員缺以上各官俱人地相宜本鎮照例出具保結并履歷咨㑹煩請查照具題等因又准督臣哈占咨為推升副將事准兵部咨內開江南江北徐州營副將惠占春題補員缺今掣著楊三元希轉飭副將楊三元速赴新任仍移甘撫知照施行等因各到臣除飭令副將楊三元速赴新任外該臣看得河州副將楊三元升任員缺自應靜候部推但河州逼近西彞畨族環居非才略敏練久悉邊情之員不克勝任今查鎮海參將劉忠歷任衝邊熟知彞情才幹明敏堪以補用河州副將其所遺鎮海參將員缺設居市口最屬衝繁查西寧鎮標中軍遊擊汪溥饒有謀略才力兼優堪以補用所遺鎮標中軍遊擊員缺查前營遊擊米之順才技過人士卒畏服堪以調補所遺前營遊擊員缺查西寧城守都司僉書楚名俊智力俱優遇事勤敏堪以補用所遺城守都司員缺查鎮標右營守備胡禎久經戰陳技藝純熟堪以補用所遺右營中軍守備員缺查鎮標中營千總官斌年力正富技藝復長堪以補用以上各辨銜缺雖少有未符人地俱屬相宜既經鎮臣保舉前來臣謹具印結并各履歷送部外謹㑹同甘撫臣鄂善鎮臣朱衣客合詞保題伏乞皇上睿鑒敕部議覆施行康熙十八年四月初九日題奉㫖兵部議奏該臣等議得該將軍侯既稱河州畨族環居且劉忠等俱係才力兼優等語均應如所題補授奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為邊地亟需能員謹循例保舉以固巖疆事康熙十八年六月初二日准督臣哈占咨為推升副將事內開准兵部咨開浙江台州副將秦𢎞猷升任員缺今掣著黃鉉查黃鉉河南人由外委以遊擊管陜西甘肅永固城副將事有軍功紀録二次歷俸年滿今應升以署都督僉事管浙江台州副將事等因奉㫖依擬用欽此併移劄付到部院准此移咨到臣竊照甘州永固城一汛處大草灘之中逼近海彞乃甘肅極邊要地也今該營副將黃鉉已升台州副將所遺員缺必須諳熟邊情才略素優者始可以資彈壓臣選得鎮畨參將陳應啓才猷軼衆洞識彞情歷任邊營熟知地利堪補永固城副將所遺鎮畨參將員缺選得臣標左營遊擊史孔筆生長邊地才技兼優戰功屢著有軍功紀録六次堪補鎮畨參將所遺左營遊擊員缺選得臣標中營中軍守備李𢎞鑒沈毅有謀騎射超軼有軍功紀録五次堪補左營遊擊所遺中營守備員缺選得臣標中營千總韓成年力精壯戰陳先登見有軍功紀録六次堪補中營守備以上各辨俱人地相宜以之推補各缺實于邊防有賴者也相應循例具結保舉除將印結履歷送部外臣謹㑹同撫臣鄂善提臣孫思克合詞具題伏乞皇上睿鑒敕部議覆施行康熙十八年六月初四日題奉㫖兵部議奏該臣等議得該將軍侯既稱永固城地方係海彞切近極邊重地將陳應啓等保題均應如所題補授奉㫖依議靖逆侯靖逆將軍少傅兼太子太師管甘肅提督事務臣張勇謹題為咨請就近題補將備以勵邊才以收實效事康熙十八年九月十八日准凉州提臣孫思克咨稱安逺參將劉虎以眼疾告辭業經查明真確咨㑹在案但安逺一營處萬山之中正當大通河腦之處逼近海彞巢穴兼以四面俱係畨族插帳非得熟識邊情膽略出衆技藝超羣之員難司厥任查得山丹營遊擊邊永昌生長邊地久歷戎行彞情固所熟識險隘又復周知遇敵果敢當先行兵紀律素著且連年隨征河東立有軍功合無即以遊擊邊永昌擢補安逺參將其銜缺既已相當人地又復相宜最于衝邊有裨者也至山丹遊擊員缺查得本標中營中軍守備王三元英年鋭志技射熟􅈺屢隨征勦勞績最著堪以拔補其中營守備員缺看得本標前營千總宋秀明敏練達才智優長鋒鏑不避奮力爭先堪以拔補此三辨者隨本提督出征進勦久相指臂其膽略才技知之最稔倘得就近擢補則三辨感恩思奮益殫壯猷而邊疆可收得人之效矣謹循例出具保結合咨查照速賜㑹題等因到臣准此該臣看得安逺參將劉虎因眼病失明難以供職業經具題辭任在案查安逺為衝邊要地畨族環居必須精明才幹之員方能控禦既經提臣以山丹遊擊邊永昌生長邊地熟識彞情遇敵敢先兵紀素著見有軍功紀録二次擬補安逺參將其山丹遊擊員缺以中營中軍守備王三元技射熟􅈺勞績最著見有軍功紀録三次堪以補用其中軍守備員缺以前營千總宋秀明敏練達才智優長見有軍功紀録三次堪以補用等因循例保舉前來除將保結并各辨履歷送部外謹㑹同撫臣巴錫提臣孫思克合詞具題伏乞皇上睿鑒敕部議覆施行康熙十八年九月十九日題奉㫖兵部議奏欽此議得將軍侯既稱安逺營設在衝邊畨族環居將遊擊邊永昌等保題前來應如該將軍侯所題補授奉㫖依議張襄壯奏疏卷五
