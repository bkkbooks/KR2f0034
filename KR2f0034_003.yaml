body:
  text: 張襄壯奏疏卷三甘肅提督靖逆侯張勇撰靖逆將軍兼管甘肅提督事務臣張勇謹題為征勦須用騎兵營員尤宜遴補籲請俞旨以資戰守事竊臣奉命専征職司軍旅所有行間一切應行事宜皆當預為籌畫悉心布置始不至臨事倉皇以蹈覆餗也目今賊氛未滅命將出師恢復郡邑非用騎兵不足以壯聲援查臣標五營原設馬兵三千名步戰兵二千名嗣因製造盔甲裁去步戰兵一百名撥往洪水馬步兵各一百名共裁撥馬步兵三百名今當進勦之際需兵孔亟臣欲抽調各路之兵則在在留守城池難於離汛又查各營官兵經去嵗撥防興安陽平等處俱未回營見在招募復難調撥似應將臣標裁撥過馬步戰兵數內聽臣募補足額并於步戰兵二千名內俱改為馬兵如是則臣標五千名數內俱為騎兵用以征勦庶軍聲大振矣至於臣標五營併衝要各營等員缺尤須亟為推補因材擬用方於守禦有賴也但臣蒙皇上恩加將軍之職則臣標中軍一官有提綱挈領統率五營之責必得副將職銜方可鈐束查臣標五營遊擊內有投誠者有可擬升用者其中營參將黃鉉才能出衆膂力超羣補用永固營副將以資彈壓庶衝營有賴矣所遺中營今題請副將員缺查安逺參將劉選勝隨師攻勦果敢有謀堪以補用也其左營遊擊張祚酌其才之所優擬另調用所遺遊擊員缺以本營守備史孔筆補用至所遺守備員缺查本營千總桂竒可以任用也其右營遊擊吕成德年巳七旬有餘又係通事業經題請休致所遺遊擊員缺以本營守備張文星補用巳經任事從征數月矣其前營遊擊陳應啓亦係通事擬另升用所遺遊擊員缺查本營千總李𢎞鑒堪以推補也其後營遊擊呂天玉亦才各有長擬另調補所遺遊擊員缺查馬營墩守備劉虎堪以補用也更右營守備張進忠歷練營政膽智兼優用補洪水衝區實為允當所遺守備員缺查本營千總田養心堪以補用也更前營守備邊永昌擬升山丹營遊擊所遺守備員缺查本營千總張士竒堪以補用也更後營守備張鍷擬升蘆塘營遊擊所遺守備員缺查右營千總孫應宰堪以補用也以上諸員皆久歷行間兵機熟諳才優膽壯戰勝攻克用補前缺各稱所長并擬步戰悉改馬兵皆係目今進征急務倘邀俞允則勦禦有資膚功可立奏矣至於中軍副將關防乃兵馬錢糧所係尤祈敕部另行鑄給其所需戰馬二千匹業巳移咨撫臣招中茶馬牽領補額俟事平再為裁減可也臣謹會同甘寧撫臣華善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十四年四月二十一日題奉旨户兵二部會同速議具奏欽此查得靖逆將軍侯張勇見今統兵勦滅逆賊正需官兵該將軍所題均應準從奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙十四年五月初一日準兵部咨為密首偽諭偽劄偽印式事內開奉旨靖逆將軍張勇勳舊大臣忠貞素著近因王輔臣背恩反叛殫抒偉略悉心籌畫又舉首吳逆偽劄益勵忠純克盡臣節深為可嘉著封為靖逆侯欽此欽遵移咨到臣準此臣即恭設香案望闕叩頭謝恩訖伏念頒爵之典朝廷所以待有功者也臣以庸劣謬膺節鉞蒙皇上不加擯斥俾得待罪巖疆冀效涓埃之報少補疏曠之愆此臣之素願所可矢天日而質鬼神者耳至於亂臣背叛誓不與之共生舉首逆謀咨繳偽劄何足言功况當邊隅多事之秋尤非閫外邀恩之日乃荷特典爵以通侯位列五等之崇萬甲觀瞻動色躬沐九重之眷三軍壁壘生光竊比班超實增愧赧若言李廣尤慶遭逢此誠不世殊榮允為當代異數臣感泣之下益矢忠貞寤寐之中不忘報稱以仰答付託之重庶無負寵畀之隆者矣臣無任感激惶悚之至為此具本専差官魏有祿齎奏以聞康熙十四年五月初三日奏奉旨覽卿奏謝知道了該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為稟報追撫􅉰民歸土事康煕十四年五月十九日據河州副將楊三元報據起台堡守備馬文廣報稱前奉憲令招撫􅉰民卑職隨即遵同差官捧執令箭告示前去宣布朝廷愛育􅉰民至意并諭以恩德廣為招徠當有窮民千餘人傾心願歸於本月十四日俱出老鴉關有在鄉住劄者有前來入城者除將歸來􅉰民即行安插外其餘尚未來歸者俟陸續招撫到日另報等情轉報到臣據此該臣看得前彞目達爾加歹成縱兵入犯河州致漢􅉰人民歸順前去者動以千計臣隨差官撫逐彞目回窠業經題報在案但臣思漢􅉰百姓獨非人情乃肯背鄉井棄廬舍相率而去者無非逼于海彞不得巳而逺徙也臣查出關之衆將及萬人致地方空虛人煙斷絶臣等無任慘然若不招其來歸不特國賦無人輸將且恐勾引海彝將為後日邊地之患矣臣即發給告示令箭差官同地方官員沿途追趕招撫去後兹據該將報據招回千餘人入關等由其餘未歸者俟陸續招來據報到日另咨報部外事關招撫􅉰民理合題報伏乞皇上睿鑒施行奉旨覽卿奏招撫􅉰民千餘具見籌畫周詳可嘉知道了該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為恭報彝目出邊併調兵勦賊情形仰祈睿鑒事竊照臣等於本年春會同各鎮起兵進勦之後適有彝目達爾加歹成率衆犯搶河州臣即兼程馳赴臨洮遣發官兵追逐出口遂恢復河洮二州業經臣題報在案今海彝阿喇奈及番族葉賽等又乘我方有事於河東竟入內地處處侵犯是以甘肅鎮臣孫思克甫定靖逺即提兵疾回甘涼用備接應臣亦遣通官梁必升前往達賴台吉處問其出兵情由并諭以朝廷德威隨據梁必升回稱達賴台吉巳差數十騎將威逺南川北川等處彝目盡行調回等情又據鎮海遊擊張文明報稱各海彝俱撤兵回窠等情臣思我兵正在計議圍蘭取鞏若海彝復侵邊界未免分我兵勢兹據前報海彝之兵盡數撤回則我得以悉力進兵無顧此失彼之虞矣臣等隨將三鎮合兵進攻河東臨洮等緣由遣人間行至秦州報知定西大將軍貝勒當領有清文內開移咨靖逆將軍甘肅巡撫我等大兵克復隴州各處直抵秦州城下四面攻圍逆賊出城三次與我對敵俱被我兵衝殺敗遁今離秦州十里劄營不便分兵前往蘭州爾等遵旨作速進勦我兩路大兵合力夾攻破賊必矣等因臣等即將河洮等處分布穩妥當即移調甘肅鎮臣統兵渡河併力攻勦於五月十七日兵至蘭州與臣等會議攻圍奈逆賊城內掘壕城上墜石計圖死守一時未能遽下臣等現在設法陷城俟克獲日另疏題報但兵馬悉會於蘭所需糧草實費籌畫雖前經臣給以印文於百姓殷實之家那借米麥料豆共計萬石并撫臣華善按察使臣伊圖在蘭附近處所購買草束三十餘萬俱各運到蘭州緣兵馬衆多支用浩繁不久告匱隨公同會議于兩鎮兵數內撥馬步兵五千交西寧鎮臣率領圍困蘭州臣等同甘肅鎮臣進取鞏昌然後遵大將軍貝勒之咨再赴秦州共圖滅冦此臣前後調兵進勦之大略也唯是此舉海彝盡數出邊則我之兵力既專大兵聲息相通則我之兵勢又振於以奏底定之功諒亦在旦暮間矣臣謹會同甘肅鎮臣孫思克西寧鎮臣王進寶合詞題報伏乞皇上睿鑒施行康熙十四年五月二十八日題奉旨覽卿奏彝目盡數出邊河西地方寧靜卿等統率官兵進取鞏昌約赴秦州合勦具見忠藎為國籌畫有方勤勞可嘉知道了兵部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為密陳邊地情形請添兵馬以資固守事康熙十四年五月十五日據河州副將楊三元呈稱竊照河州地處極邊為遐荒衝要之處番彝出沒全賴汛兵以固疆圉查本營額設官兵除奉抽撥外所有存營兵數寥寥無幾誠恐汛廣兵單不無鞭長莫及之慮况今多事之際尤宜預為隄防庶守禦有資不至臨時周章等情到臣據此該臣查得河州孤懸天末為番彝出入門户兼之幅􅊷遼闊防禦尤難若兵力單薄分布稍疏恐非未雨綢繆之至計也目今海彝雖云回窠而狡謀叵測能保其不為他日之憂添兵防守似難刻緩者矣兹據呈請等由應於該營增添馬兵四百名補設把總一員以資分防者也除即會商撫臣一面檄令暫行募補以備不虞外謹會同甘寧撫臣華善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十四年五月二十九日題奉旨户兵二部會同速議具奏欽此查得該將軍既稱河州為番彝出入門户防禦不敷等語應如所題準添馬兵四百名補設把總一員俟事平之日裁減可也奉旨依議附兵部題為恭繳上諭事康熙十四年閏五月初一日奉上諭諭兵部秦省巖疆重地軍務方殷靖逆將軍靖逆侯張勇忠勤懋著謀略優長久鎮西陲奠安疆圉近復躬履行間殫心籌畫屢敗賊衆恢復城池志期殲滅逆渠底定秦隴朕甚嘉之凡用兵籌餉一切機宜必須重其事權不拘常格而後可以整飭軍紀齊一衆心以收蕩平之績所屬地方總兵官有故違節制不聽調遣者許即行指參副將以下有臨陳畏縮殺良冒功者聽以軍法從事其文官自道員以下倘有遲誤緊急軍需者許會同巡撫據實參奏務令克展壯猷早奏膚功以副朕委任至意爾部即遵諭速行特諭欽此恭捧到部除遵旨行文外所有奉到上諭一道理合恭繳謹此題知康熙十四年閏五月初五日題奉旨該衙門察收靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為飛報大敗鞏昌賊衆并請優恤陳亡將辨事竊臣統兵劄營圍困鞏昌日夜巡防密行偵探務得敵情以預為設伏接應之計當有逆賊王輔臣遣偽先鋒副將任國治偽副將王友祿于本年閏五月二十九日三更時分帶領三千餘衆潛至鞏昌由東門入城臣外示之以弱內實嚴加隄防詎偽總兵陳可鄭元經偽布政司陳台孫偽道郎熙化等果于六月初二日帶領各營偽辨潘連等率賊兵六千餘四門齊出直衝我營幸臣有備隨即鳴號出兵親自臨陳令千總韓成等率領精兵截賊後路并堵絶城門復令副參遊守劉選勝等奮力齊進自鞏昌城西南角殺至城東陳斬逆賊首級無算尸橫遍野血滿城壕唯餘數十殘冦􅍆命奔遁入城得此一捷亦可以破賊心膽矣更活擒四百七十餘賊審係真逆即行正法其無辜被脅者臣仰體皇上好生之德俱已釋放訖當獲盔甲器械即行給賞有功人員所有陳傷輕重官兵馬匹等項俟查明報部外此皆賴我皇上天威而諸辨效命之所致也但查撫標遊擊張大選因追殺敗遁賊衆直迫城下當被城上炮打傷亡該臣看得張大選臨城追賊矢石不避殫心滅冦奮不顧身兹查炮傷殞命深為可憫似宜從優恩恤以慰忠魂庶行間將士知所激勸者矣緣係勦賊大捷理合報聞伏乞皇上睿鑒敕部議覆施行康熙十四年六月初六日題奉旨覽卿奏率領官兵圍困鞏昌逆賊偽總兵陳可等帶領賊衆出城拒敵卿等親督官兵奮勇擊賊擒斬甚多得獲盔甲器械等項具見調度有方將士奮勇可嘉在事有功人員事平之日議敘具奏遊擊張大選作何恩恤著議奏兵部知道欽此查遊擊張大選應照例加一級給恤銀四百兩準廕子弟一人以守備推用應得祭葬請敕禮工二部議覆可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為密陳三路進兵以收全勝事竊臣觀古來亂臣賊子雖狂逞于一時不旋踵而身膏斧鉞此亦天道之昭然不爽者也吳三桂受國厚恩不思報效乃包藏禍心圖謀不軌普天切齒恨不滅此而後朝食其亡也亦可立而待者矣但反叛之徒往往盤踞一方以為進戰退守之計所謂負嵎之虎人莫敢攖今吳逆據有全滇輜重糧草悉聚于此亦彼根本之地若不斷其根而鋤其本徒勞王師四出聲罪致討雖天威逺播所向無前究竟賊之股肱傷而腹心無恙猶可茍延釜底坐以觀變臣愚以為宜用竒兵出其不意以直破其根本之地根本既失將見分出各路賊兵靡不各慮室家而驚心落膽也此不攻自潰不戰自屈逆謀雖狡其如衆心之瓦解何哉然此法必由三路進兵方可以收全勝所謂三路者一路由草地往麗江之東一路由草地往麗江之西此東西兩路每路各用一將軍統兵進勦并齎敕發給麗江各土官令其引導前進蓋麗江一帶舊遭吳逆於其地方採取金銀百姓受其茶毒怨聲載道今若乘其機而驅使前行未有不歡欣鼓舞樂為我用者也更一路須由安龍入師宗州之曲靖查安龍泗辰等州各土官及宋時儂智髙之後廣南府土官儂鵬皆臣奉征雲南時所經招撫者後被吳逆凌鑠暴虐心懷憤恨匪伊朝夕今宜於此路用一將軍統兵進勦亦齎敕發給各土官如麗江例又未有不樂趨恐後者也且以雲南二十府屬之土官率被吳逆傾陷絶其宗祀失其職位怨府愁城巳非一日今倘俱蒙給發敕印復其原官孰不起兵響應為我前驅者乎再祈敕下平南王并廣東督撫設法調遣官兵從交趾國竟出雲南地方夾攻并咨會該國王以王師討逆假道經由該國不必驚恐於是各路精兵一齊進發直抵雲南攻其無備賊必以我兵從天而下斷無有不倒戈授首者况目今逆兵精鋭者多集於湖南而腹裏空虛我有數路之兵長驅夾擊功成易易矣此臣一得之見總為滅賊心切報國情殷故不揣芻蕘冒瀆天聽應否可行非臣所敢擅専伏乞皇上睿裁緣係密陳破賊機宜臣謹具題請旨康熙十四年六月十二日題奉旨議政王貝勒大臣會議具奏欽此該臣等查得將軍侯張勇為國籌畫題請三路進兵及加恩土官從交趾界起兵夾勦所議甚是但各處大兵見在分頭進勦逆賊其三路進兵之處今不便遽議俟後有機會再議可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為敬抒管見條陳安邊之䇿以備採納事竊臣待罪巖疆謬承節鉞凡保境寧民治軍防冦何一非臣所當夙夜籌畫者蓋非兵則捍禦莫資而無民則邦本奚賴是設兵恤民二者所關於今日為最切也至于海彝出沒靡常狡詐莫測若但知撫柔而不加懲創恐有釀成後日之患者矣兹仗皇上天威叛逆將盡蕩平海彝悉已逺遁秦省底定自可計日而待也但既定之後臣又審時度勢有不可不預為之謀者備列三欵敬為我皇上陳之一秦中之要地分布宜密也查漢中襟帶省會控馭川湖應駐大兵二千名設總兵官一員兵三千名誠以逆賊雖已敗遁而蜀冦方在固守我兵亦暫當養鋭之時不得不將通川衝隘布置周密臣料川中殘破巳極今賊之催徴尤急民不堪命不過期月之內人心必至瓦解有此一鎮官兵防守要區然後乘機進取動出萬全矣再如秦州西控階文南接漢中且附近臨鞏萬山環繞易為盜藪應駐大兵一千名總兵官一員兵三千名但恐一時招募不及或于各鎮抽撥馬戰兵一千五百名步戰兵一千五百名應設將備千把等官亦隨即遴委題補庶足以濟急用而資控制者也其平涼既有提臣駐劄查固鎮離平涼僅一百六十里相距不逺可以遙制應將固鎮改駐慶陽誠以慶陽僻處山谷地瘠民頑近遭逆賊蹂躪之後民心不一非設鎮將恐不足以資彈壓也至鳯翔東連省城北通平慶南控漢中西接秦鞏應駐大兵三千名庶足以備四面接應者也更寧夏鎮一缺查見任天津衛總兵官趙良棟向隨臣征勦雲南謀略膽智迥出尋常臣知之最稔懇乞皇上俯念寧夏重鎮準調趙良棟移駐於此必能大展猷為無負簡任者也臣所謂非兵則捍禦莫資者如此一秦省之百姓宜加憫恤也查自王逆叛變以來河東臨鞏處處被冦摧殘凋敝已極非此賊勒催糧草則彼賊徴索餉銀前追未完後呼又至展轉仳離循環弗絶臣經過各處其顛連情狀不覺觸目傷心今雖節次克復然斯民久罹湯火骨枯髓竭若不大沛恩膏格外撫恤非四散逃亡則委填溝壑將來井里不至於炊煙盡絶不已也籲請皇上𢎞如天之仁若臨洮府屬之蘭州金縣岷州等處鞏昌之秦州清水秦安徽州兩當等處漢中之寧羌西安之長武平涼之華亭等處受害最慘準全蠲見年正供如漳縣洋縣略陽褒城鳯縣安化寧州環縣等處受害次之酌蠲本年田賦之半更如通渭南鄭西鄉沔縣等處受害又次之似應十免其三庶百姓之殘喘得以少延然後安生樂業輸將恐後而兵食亦有攸賴矣臣所謂無民則邦本奚賴者如此一海彝之強悍宜行痛懲也查臣自滇調甘之時業將海彝盡數驅逐回巢間有悍橫不服者亦經勦殺敗遁故十年以來皆巳讋服不敢侵犯乃自王逆變亂後臣率兵東征海彝復乘內地有事肆行蠢動侵我邊陲掠我人畜傷亡我官兵在在告急人心惶惑若非我皇上天威丕震則河西一帶為其魚肉久矣今幸各彝部落渙散無統唯聮生格并雲南開路之台吉等互相聯絡久欲鴟張希圖入犯臣思三邊為秦省重地而甘肅尤為秦省咽喉若不大彰天討不特後來深為邊患即目下秋髙馬壯未必不乘隙窺伺動我斥堠也兹宜先發以制之俟平慶肆靖貝勒大將軍及各將軍駐兵臨鞏休兵牧馬之時令各鎮乘戰勝之師大舉進勦逐其逺遁庶海彝不敢再萌肆犯之心而我兵亦得以專力進討南方叛寇矣臣所謂不加懲創恐釀成後日之患者如此以上三欵以之設兵固防無不戰勝攻取黎民之元氣既復強圉之烽煙永靖誠今日安邊之要略也如果臣言可採伏乞皇上睿鑒敕部議覆施行康熙十四年六月十二日題奉旨議政王貝勒大臣會議具奏靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為恭報恢復鞏昌郡城事竊照臣等因圍蘭兵馬衆多軍食不接隨分兵前赴臨鞏會合大兵于閏五月初五日擊敗賊衆一次臣等于初九日兵抵鞏昌蒙定西大將軍多羅貝勒差纛章京卜克撤等來鞏調兵于二十三日令甘肅鎮臣孫思克統兵赴秦州會合大兵夾勦逆賊去後復于六月初二日鞏賊四門突出被我官兵勦殺幾盡餘賊敗遁入城等情由俱經題報在案嗣于本月十七日臣等原遣去探聽平涼賊情千總羅天夀報稱王輔臣遣逆子同偽總兵李國梁等帶賊兵數千前來救援鞏昌已至安定監地方下營等情臣一面發兵前去堵勦一面移會定西大將軍多羅貝勒仍令甘肅鎮臣率兵圍鞏合力攻勦併于鞏城四面環挖壕塹斷賊出路間今六月二十五日大將軍貝勒遣安西將軍臣穆占帶大兵同甘肅鎮臣孫思克原領官兵并令投誠總兵陳萬䇿等一同來鞏齎有赦免敕諭及大將軍多羅貝勒招撫告示臣等會議亦發告示令陳萬策等入城招撫衆賊既感皇上寬宥之恩復見我官兵雲集又掘挖壕塹自知生路巳絶乃于本月二十七日盡行出城投繳偽劄戴罪歸順軍民歡聲動地皆賴皇上恩威逺被地方漸次恢復臣等仰體皇上好生至意一切文武官員俱行宥貸計投誠總兵副參遊守千把陳可等共一百二十二員道府廳縣等官陳台孫等共十九員統領壯丁偽文武官監紀同知陳曜吉遊擊王克忠等四十六員各營馬步兵丁四千九百七十五名壯丁五千六百三十名城關户口共一十三萬五千七百餘名口除將偽文武官員職名造册并繳到偽劄票送部外事關恢復郡邑臣謹會同甘肅鎮臣孫思克合詞題報伏乞皇上睿鑒敕部議覆施行康熙十四年七月初二日題奉旨覽卿奏統領官兵圍困鞏昌擊敗逆賊又大將軍貝勒遣將軍穆占鎮臣孫思克等會兵合勦隨齎赦免敕諭招撫賊衆盡行繳劄投誠招撫過偽文武官一百八十餘員兵丁一萬餘名安輯人民一十三萬餘名口恢復鞏昌府城具見調度有方勦撫並用可嘉在事有功人員著議敘具奏該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為土官戰功足録懇豁前愆以勵後效事竊自叛賊變亂河東淪陷臣志切討逆率兵東渡實因分布不敷欲抽調各汛緑旗官兵又恐人心不齊查經略所調各處征兵中途悉皆逃散前轍可鑒必難為用臣於是檄調各處土官結之以恩信勵之以忠貞隨有寧莊各土官如魯大誥祁伯豸李沐等各帶土兵千餘攻圍蘭州賴其戮力克取臨洮並洮岷土官楊朝梁率屬部土兵四千餘效命征勦仍倡率各土官如咱成福帶兵二千有竒馬國棟楊威等各領兵千餘趙之鼎后國璽各帶兵七八百名俱圍攻岷州蘇成威帶兵三百餘王拱斗帶兵五百名檄調把守臨洮共糾兵萬餘克復洮州攻取岷州查陷陳衝鋒不避矢石土官之功獨著且各處土兵被賊傷亡者甚衆他日論功俱各有優敘毋庸臣贅惟土官咱成福身負殺人之罪擬定大辟監禁鞏昌乘隙越獄逃避深山續因逆賊變亂一聞調兵征討欲糾衆從軍將功贖罪以懷疑生畏不敢前來臣查成例有戴罪圖功之條遂給以免死照身令其勦賊以自贖而咱成福即率所部土兵二千有竒克洮攻岷屢著戰功今奉調帶兵五百同楊威所部前赴鞏昌圍攻逆孽查咱成福始雖偶犯典刑貪生越獄繼則勠力疆場矢心報國似應免其前罪稍加恩典俾咱成福感激思報以收後效而一時土官亦皆鼓勵奮往矣但此恩出自上裁非臣所敢擅専也臣謹會同甘寧撫臣華善西寧鎮臣王進寶合詞具題伏乞皇上睿鑒敕部議覆施行康熙十四年七月初二日題奉旨該部議奏欽此查靖逆將軍侯題敘土官咱成福克洮圍岷軍功應俟攻克岷州之日一并議敘奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為密報緊急彝情事竊照海彝年來所以不敢侵擾者實緣定羌廟一捷心膽已寒兼以我兵防禦嚴密無隙可乘也邇因臣同鎮臣率兵東征海彝逆知兵馬悉調在外內地空虛故前巳肆犯搶掠今復鴟張蠢動或假稱尋馬打牲或借端插帳駐牧諸如此類無非窺探虛實希圖侵犯耳臣稔知彝人蓄謀已久擬欲大率精鋭追奔逐北以挫其鋒因中外一家奉有不得擅殺之嚴旨故未敢即為進兵乃彝人不思朝廷寬大之典乘我有事之際輒敢插帳于大草灘蔓延無忌撫逐不去此亦漸不可長也若不及此時痛加勦殱至秋髙馬壯必統部落前來入犯亦勢所必至矣臣愚以為大兵現在河東臣等再統兵馬一同出口大舉進勦用彰天討永靖邊氛亦千載一時也但臣與鎮臣俱在河東用命未敢擅回相應請旨或臣回駐莊浪兩相彈壓或甘肅鎮臣回甘整飭邊務事關彝情叵測情由臣謹會同甘寧撫臣華善甘肅鎮臣孫思克合詞具題伏乞皇上睿鑒敕部議覆施行康熙十四年七月初八日題奉旨議政王貝勒大臣會同速議具奏欽此該臣等查得秦州鞏昌蘭州等處雖經次第恢復然陜西全省底定惟在速取平涼如不將逆賊王輔臣早滅一日則秦省兵民一日不得安生近經會議行令靖逆將軍侯張勇與大將軍貝勒等會商作速勦滅逆賊王輔臣平定平涼等處拯救生民出於水火最為緊要將軍侯張勇總兵官孫思克等不便回去如彝人顯然有變果實擾民令總兵官孫思克回甘料理邊務可也奉旨依議速行靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為鞏郡恢復請增官兵以資固防事竊照鞏昌一郡實當衝要之區東通汧隴南連漢沔西接蘭河北至固靖乃西秦腹心川蜀咽喉之地也我朝定鼎之初本郡設立總兵官鎮守後屢經裁減止額留遊擊一員千總一員把總二員馬戰兵二百名步戰兵一百名守兵二百名但鞏郡為秦保障幅􅊷遼闊萬山環繞易為盜藪兼以被賊蹂躪之後逃竄流孽出沒不常兵力單薄實難防禦且遊擊職銜亦非所以統攝全郡之險要者也今地方雖經恢復而綢繆之計不可不詳應改設副將一員再設守備一員千總一員把總二員馬戰兵四百名步戰兵二百名守兵一百名與舊額兵共合一千二百名庶緩急有備防禦足資而全城賴以捍衛安如磐石矣俟事平之日再為酌裁事關增添官兵重務非臣所敢擅專伏候上裁臣謹會同甘寧撫臣華善合詞具題伏乞睿鑒敕部議覆施行康熙十四年七月初八日題奉旨户兵二部會同速議具奏欽此查得該將軍既稱鞏昌要地兵力單少防禦不敷等語應如該將軍所題俟事平之日再行裁減可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為行間效力歷著戰功特請咨部復職以廣皇仁事康熙十四年六月十九日準兵部咨前事內開準靖逆將軍侯張勇咨稱賀雙龍革職雖難考其果否寃枉但現今隨征勠力用命屢有戰功况有革職官員敘功還職之例今勦賊正殷應否還職惟侯部裁等因查賀雙龍于康熙十二年十月內奉旨革職之官今該將軍既稱見今隨征屢有戰功不便據咨查議應咨該將軍查明係何處戰功具題到日再議可也等因備咨到臣準此隨咨西寧鎮臣王進寶即將賀雙龍係何處戰功查明咨覆以慿具題隨準鎮臣王進寶咨稱查得革職遊擊賀雙龍帶領親丁跟隨本鎮出師赴蘭于本年二月二十三日夜渡河于二十六日至新城與賊對敵斬獲賊級嗣于本年三月內逆賊乘天降大雪直奔營盤衝殺前來本官奮力勦殺直抵城邊又于本年四月內逆賊大隊突出東門本官奮力當先殺進東關當陳所斬并活捉賊兵以及奪獲器械節經塘報在案况本官對陳之際奮不顧身中箭傷腿屢著戰功其勞績誠不容泯者也等因到臣該臣查得遊擊賀雙龍先以互訐被參革職繼因征勦逆賊勠力疆場屢立戰功援例呈請復職經臣咨部嗣準部查賀雙龍係何處戰功等因臣即移西寧鎮臣確查去後今準該鎮臣王進寶查明咨覆前來謹會同甘寧撫臣華善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十四年七月初八日題奉旨兵部知道欽此議得靖逆將軍侯張勇以賀雙龍隨西寧總兵官王進寶出師赴蘭勠力屢立戰功軍功難泯題請還職前來相應準將賀雙龍復還原職後不為例可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為飛報恢復岷州并有功人員仰祈睿鑒事康熙十四年七月十六日據洮岷副將楊朝梁報稱卑職委令隨征參將馬國棟等前至岷州進城招撫去後于十三日午時據闔城文武官員劉翊漢等階州統兵官李永茂等率領兵馬出城各親繳札投誠卑職隨即遣差官孫進禮等統領漢土兵馬一千名進城安撫百姓俱各復業等情具報到臣據此該臣等看得自逆賊叛變在在附從臣等渡河進勦志欲一鼓蕩平惟因河東郡邑悉非我有兵馬單薄分勦不敷遂檄調土官楊朝梁糾率各土官集兵攻取洮岷所屬一帶除洮州巳經克取外其岷州于四月內副將楊朝梁率原領各土官之兵進攻因偽同知劉翊漢力主堅守布散流言使賊衆負固不服兼以岷州地通階文險要之區致攻圍四閲月不下其間逆賊數出突犯屢被各土官殺敗入城又因各土官原無攻城火器臣遣本標右營把總孫進禮帶鳥鎗手三百名前赴協力攻勦仍仰體皇上好生至德飭令兼用招撫之法聽賊投順今已相率來歸其發縱指示督率攻圍實副將楊朝梁之功而勠力用命勤勞最著則土官趙𢎞元馬國楝等俱勞不可泯者也此皆仰賴我皇上威福故岷州一時就撫全城得以恢復所有繳到偽劄咨送兵部外事關恢復岷州城池并勠力人員理合題報伏乞皇上敕部議覆施行康熙十四年七月十九日題奉旨覽卿奏遣發副將楊朝梁等率領官兵圍困岷州屢敗賊衆隨行招撫闔城官員軍民人等繳劄投誠恢復岷州城池具見調度有方勦撫並用可嘉在事有功人員事平之日議敘具奏該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為稟報􅉰民歸業事竊照河州漢􅉰百姓前因彝目入犯逃出萬餘人除先經招回千數入關已經題報外今于康熙十四年七月二十日據河州副將楊三元報稱前蒙本將軍差官執持令箭著卑職同地方官前去關外招撫􅉰民卑職隨差把總王國弼同差官齎執令箭于二十日前往招回去後今于本月十五日據王國弼等稟稱卑職等屢加善言招撫􅉰民宣諭朝廷恩典及各大將軍愛民之意今招來􅉰民茶商馬嘉錦馬應才等一萬餘名口卑職等于本月十二日先行護送進關等情具報到臣據此該臣看得􅉰民性頗狡悍今被海彜勾引關外恐日久無倚必將為其所用是以臣等復遣官前去同地方官善行開諭招撫回歸今據報招回萬餘盡數進關從此照舊復業可杜邊釁之患矣事關􅉰民盡數回歸相應題報伏乞皇上睿鑒敕部議覆施行康熙十四年八月初六日題奉旨覽卿奏招撫到河州􅉰民萬餘人盡數復業可嘉知道了該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙十四年七月二十一日準兵部咨為遵旨議敘事內開奉諭旨將軍張勇為國效力克盡忠誠恢復河州洮州不日克取蘭州往助圍秦州大兵差伊子張雲翼齎奏前來殊為可嘉將張雲翼作何從優録用之處著吏兵二部會同速議具奏欽此議得應將張雲翼從優以大四品京堂員缺先用可也等因奉旨依議欽此移咨到臣臣思録勤紀勩雖聖代之𢎞恩而討逆除姦乃武臣之常職兹者臣男張雲翼業受恩廕齎奏進京先以移家蒙賜五百之帑金復以京堂擢大四品之任用俯念強場微績致邀楓陛崇褒湛恩霈自九重溫綸頒於兩世如斯異數洵屬殊榮世以祿仍世以官盛典之加特渥念臣身因念臣子天朝之寵實隆揣分難安問心有愧擬辭成命恐蹈矯飾之愆謹戴洪慈冀效涓埃之報蓋賞延遞及總知髙厚難酬惟忠藎相承永切捐糜共矢者矣除臣恭設香案望闕叩頭謝恩外為此具本謹具奏聞康熙十四年八月初六日奏奉旨覽卿奏謝知道了該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹奏為恭謝天恩事竊臣自昔年征勦被傷箭瘡頻發不時痛楚衰殘困憊日甚一日蒙皇上不加擯斥俾得待罪巖強寵眷之隆巳屬曠典乃荷敕遣名醫章師吉前至軍前代臣診治以犬馬之軀致邀聖主股肱之愛臣雖頂踵捐糜亦難仰酬皇仁於萬一也兹醫官章師吉於康熙十四年七月二十六日同臣差官魏有祿巳到鞏昌臣謹恭設香案望闕叩頭謝恩隨請醫官診視據云必俟晴霽針治針後須靜攝一載或半載俱勿勞苦動作方可復舊臣思見在行間軍務倥偬既非靜攝之時兼以逆氛未靖勦撫方殷恨不能尅期蕩平以抒宵旰尤非微臣急於治病之日也若一面用針一面動作恐治不如法難於奏效有辜皇上眷顧至意臣之罪更擢髮難數矣臣謹差官護送醫官章師吉回京俟孽盡氛銷臣得安靜調攝之時再請恩旨賜醫治療則有生之日皆報效之年也為此理合具疏奏謝伏祈皇上睿鑒施行康熙十四年八月初六日奏奉旨該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為地方巳經恢復酌駐重臣官兵并要地添設總兵以固封強以資勦防事康熙十四年八月十九日準兵部密咨內開議得陜西總督哈占疏稱秦州緊要將固原總兵朱衣客移駐秦州漢中接連川疆應設總兵分立三營同大兵駐劄鳯翔逼近南山應設援勦總兵一員令四川左路總兵官陳竒謨將缺額官兵召募補足駐劄鳯翔至於平涼且晚可破提督陳福必須移駐於此寧夏總兵官自應早補等因應敕下將軍侯張勇將前後事宜詳議到日再議奉旨依議密咨到臣該臣等看得秦州東接關隴鳯寶南連略沔階文允為通川要地是以督臣請令將軍臣暫駐秦州但臣等前在秦州同大將軍貝勒會議鞏岷二處新經恢復鞏郡距岷僅二百餘里岷城迤南之階州見為諸逆盤踞我兵方有事於平涼未暇攻取隨令西寧鎮臣王進寶統領緑旗兵馬八千有餘會同大兵駐防秦州臣等仍回駐鞏昌居中䇿應以防階文而消反側惟俟平涼旦晚收復在秦大兵仍令駐防鎮臣王進寶及甘肅鎮臣孫思克各令回汛彈壓提臣陳福即令駐劄平涼至提臣既駐平涼則寧鎮缺員巖邊要區自當預請速補秦州為緊要重地急需智勇兼備之大帥方可控制必俟其抵任之後乃可令鎮臣王進寶回汛更查鳯翔為雲棧要衝就便以陳竒謨暫駐鎮守俟陜西平定之日仍令赴川又漢中接連興安廣元密邇川湖添設總兵以備攻守均應如督臣所請各設總兵一員分立三營惟是軍需恐詘或于秦省各鎮標營抽撥照馬三步七之例每鎮各設兵三千名以資聯絡防禦庶地方得以鞏固而糧餉不必議增矣至於固原鎮既近平涼自應裁併移駐臣等臆見如是所有詳議過機宜謹會同督臣哈占合詞密題伏乞皇上敕部速議施行康熙十四年八月二十四日題奉旨議政王貝勒大臣會議具奏欽此會議得漢中等處設鎮添兵臣等請敕將軍張勇總督哈占等詳議具題到日再議今雖將軍張勇具題總督哈占尚未具題不便遽議俟總督哈占具題到日一併再議可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為鞏郡恢復請增官兵以資固防事康熙十四年九月二十九日準兵部密咨覆臣題前事內開應如所題改設副將一員再添守備一員千總一員把總二員馬戰兵四百名步戰兵二百名守兵一百名共成一千二百名其應設將備聽該將軍遴選題補等因奉旨依議欽此備咨到臣臣因鞏昌一郡處四通之間地勢遼闊夙稱險要祗恐兵力單薄難資防禦故前有改設營制增添官兵之請也今欽遵俞旨除將應增兵馬行令招募外至所需將備看得莊浪副將馬山自叛逆變亂以來調遣征勦屢著功績調補鞏昌副將似為允當其中軍守備查得投誠遊擊金宫聲原係山西千總隨標效用遣防招撫屢副任使堪補鞏昌中軍守備至莊浪副將遺缺查得投誠總兵官陳萬䇿帶兵一千九百有竒倡先投誠又經定西大將軍給以總兵官委牌遇缺補用且幼曽隨臣征勦久經戰陳聞臣東征故先率兵投誠又不避艱險入鞏昌城內招撫文武一百八十餘員恢復地方功誠難泯且才略超衆以補莊浪副將彈壓要地鼓勵勞員似為得宜者也再照原任鞏昌遊擊劉彪宜暫令隨臣征勦待後遇缺另行題補臣因封疆起見謹會同督臣哈占甘寧撫臣華善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十四年十月初四日題奉旨該部知道欽此該臣等查得投誠偽總兵陳萬策偽遊擊金宫聲俱係秦鞏新經投誠之官今該將軍既稱其招撫有功堪以補用等語均應如該將軍所題莊浪副將馬山應準以原銜調管陜西鞏昌營副將事金宫聲應準以署守備管陜西鞏昌副將中軍守備事陳萬策應準以署守備管陜西莊浪副將事其原任鞏昌遊擊劉彪應準遇缺另補可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為咨繳偽劄事康熙十四年九月二十九日準兵部咨內開準臣等咨稱河州知州鄒玗衛守備李乘龍州判婁文明前來軍前投誠各繳偽劄一張仍委令照舊管事等因到部查知州鄒玗州判婁文明衛守備李乘龍應否再議或竟免議之處該將軍咨內並未敘明本部不便懸議仍行該將軍等查明具題到日文職聽吏部議武職聽本部議可也等因到臣準此該臣查得河州先為逆賊竊踞知州鄒玗衛守備李乘龍等委係被脅與附黨從逆者有别故於海彝犯搶河州攻圍城池時鄒玗等協力防守共保無虞續因臣等遣發官兵驅逐海彝鄒玗李乘龍婁文明等遂俱赴軍前繳劄投見臣等因奉有如能棄邪歸正投獻城池官復原職之旨且彼時適在用兵之際糧草缺之故就便會委令其各復原任徴催糧餉以濟征勦且鄒玗巳經臣等題升河州監收同知奉有俞旨在案似與李乘龍婁文明均應免議以廣皇仁者也所有查明緣由理合具題伏乞皇上睿鑒敕部議覆施行康熙十四年十月十九日題奉旨該部議奏欽此查該將軍等既稱知州鄒玗衛守備李乘龍等委係被脅情屬無奈故令各復原任均應免議等語應將衛守備李乘龍免議準復原任文職鄒玗婁文明聽吏部議可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹密題為欽奉上諭事準兵部咨開康熙十四年十月初九日奉上諭諭兵部秦省最為緊要故一切綏定地方勦除賊冦倚任將軍侯張勇雖有定西大將軍貝勒統領大兵圍困平涼倘賊冦死守有需月日亦未可定且聞川賊過長寧驛已到平涼若不速取平涼以滅逆賊王輔臣秦省不即底定百姓必至重困勿以大將軍貝勒在陜有所瞻顧致誤大事目今克取平涼其事所關最要鞏昌宜量留官兵張勇親統官兵速與大將軍貝勒董格等會合并力急取平涼若萬不可親身離鞏則多撥標下精鋭官兵作速發往平涼至於盤龍坡長寧驛等處賊來救援之路作何防禦張勇等酌量而行其速定平涼事關重大將軍侯張勇朕倚任甚殷務令慰朕西顧之懷爾部作速行文欽此相應行咨等因到臣該臣看得逆賊王輔臣死據平涼又有川賊赴援誠宜速靖逆孽以安地方今蒙皇上令臣親赴平涼或遣兵發往仰見神武𢎞謨無微不屆臣感眷注之殷亟宜親行以抒皇上西顧之懷但臣屢接定西大將軍貝勒臣札示鞏秦地方最為緊要川賊蠢動惟賴將軍巡撫彈壓等語又查河西各邊將屢報海彜麥力幹等有收拾兵馬入內犯邊情形萬一知我虛實狂逞入犯乏兵堵禦非計之得也故臣等特撥甘肅鎮標并各營馬步兵一千名令永固城副將黃鉉統領回汛防禦再撥各營兵一千名令鎮番參將陳應啓統領赴髙古城隄防又查蘭州為河西咽喉臣與甘西二鎮逺在各處鞭長莫及復量撥各營馬步兵丁一千五百名令莊浪副將馬山安逺參將呂天玉等協守河口此臣移緩就急之䇿也至於臣標額設馬兵五千名除留守甘州兵五百名并西安至鞏昌鞏昌至平涼兩路安設塘撥兵四百名而臣標中營副將劉選勝後營遊擊劉虎隨甘肅鎮臣出征平涼帶領馬兵一千一百名又撥營馬三百匹馱載盔甲及甘肅鎮臣到平涼貝勒因其標營馬匹倒斃過多移臣添撥臣復於戰馬內撥給三百六十匹以資征勦又因固原逆賊鴟張屢犯靜寧地方勒催百姓運糧臣同撫臣商議遣撫標遊擊嶽鎮邦本標守備孫進禮帶撫標馬兵五百名臣標馬兵七百名駐防靜寧再遣臣標千把總羅天夀狄世俊帶兵三百駐防馬營監梁家河等處又岷州地方逆賊談宏等帶兵萬數入犯土兵見有損失不能阻當臣一面塘報貝勒一面遣守備栁開甲帶馬步兵五百名前去岷州堵勦今賊與我兵隔河相持臣擬再遣標兵五百名協力防禦其情形尚在叵測此臣標營兵馬撥發之大略也再照分防安會伏羌臨洮各州縣原係甘西二鎮標兵今鎮臣俱各撤回帶領征勦臣又遣撥標營馬兵一百或五六十名不等共調去兵四百名而臣標見在之兵僅一千六百矣近準西寧鎮報稱逆賊吳之茂帶領五員偽總兵統兵數萬于單家河小川子徽州等處下營未敢遽爾入犯者良以窺探虛實耳今臨蘭秦鞏洮岷各營兵馬尚在召募為數無幾且無盔甲又係新招難堪任用撫臣華善標兵一千五百亦分發各處防守在鞏不過數百今鞏秦岷州賊勢如此加之解散降兵雜聚其間臣赴平涼必須調回本標出防之兵庶便前去但恐倉卒撤回而各處地方設有反側不可不深慮也且臣一經動移逆賊聞知或乘虛入犯則鞏岷等處未能保其無患是平涼固屬重大鞏岷亦為要區臣晝夜思維酌度時勢誠不便逺離鞏昌且兵甚單薄委無發往平涼之兵合無請乞皇上敕下陜西提臣陳福速行進兵協勦逆賊庶底定之勳得以早奏矣為此理合具疏題報伏乞睿鑒敕部議覆施行康熙十四年十月二十一日題奉旨議政王貝勒大臣會議具奏欽此該臣等查得靖逆將軍侯張勇身在地方既稱鞏岷甚為緊要誠不便逺離鞏昌兵甚單薄委無發往平涼之兵俱如所題固守鞏昌秦州等處堵禦逆賊又先經會議令在陜西神水所有歸化城土墨忒蒙古兵馬及駐劄大同副都統搯塔大兵速赴提督陳福處協力進取固原今此兩處兵馬不拘何處兵馬先到提督陳福處該提督即往會合大將軍貝勒等大兵協力速取平涼勦滅逆賊可也奉旨依議速行靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為酌移糧餉募兵征勦以靖逆氛事竊照川逆鴟張盤踞各口階文迤東商州迤西俱有逆賊突犯兼以吳之茂入冦西和王輔臣死拒平涼勦禦之際在在需兵目今各鎮兵馬分布不敷而臣標雖有兵馬五千分防遣征之外所留無幾兵力單薄克敵為艱擬請添兵又須增餉臣查得興安漢中地方巳被賊據而原設興安鎮標各營官兵今巳虛懸其糧餉之數可估計而知合無將興安一鎮所屬各營官兵估定俸餉移撥臣標或在甘寧西三鎮標下以資招募進勦所需馬匹移會甘撫招中牽領如是兵既增加則征防有賴而底定之績可立奏矣俟興漢恢復之後再將原撥餉銀照數發回興安鎮其招募兵馬撥發興漢等處以資防禦庶糧餉不致增添兵馬又得充足勦禦咸備秦疆可定矣臣因征勦起見伏乞皇上睿鑒敕部議覆施行康熙十四年十一月二十二日題奉旨依議速行張襄壯奏疏卷三
