  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0034_WYG_004-1a, image: WYG0430/WYG0430-0373a.png}
body:
  text: 張襄壯奏疏卷四甘肅提督靖逆侯張勇撰靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹密題為舉首逆書事竊照逆賊人犯西和臣正在計畫勦禦間於康熙十四年十一月二十一日有二人到臣軍前鬚髮盡白見臣惟有哭泣因投書一封説係叛賊吳將軍著來鞏昌投遞臣問你係何人年齒巳老為何前來投送逆書據供小的一係貢生一係百姓俱有家眷三四十口頗饒産業蹇被叛賊吳將軍將小的并家口拿去與書一封著來投遞如若不來就要把小的殺了并處治各家口無奈冒死前來投獻等情據此臣隨拆閲來書俱係亂言反間竊臣素秉愚忠一心為國恨不亟殱窮凶用昭天討以快人心何物叛逆勒害良民敢以狂言煽惑微臣真不禁髮指除將二人扭鎖監禁將逆書咨送兵部外相應題報候旨發落伏乞皇上睿覽敕部議覆施行康熙十四年十一月二十二日題奉旨覽卿奏逆賊差人投書卿即行舉首將來人拿禁具見矢志忠貞可嘉著議敘具奏餘著議奏兵部知道欽此除逆書焚燬外查靖逆將軍侯張勇出首逆書相應議敘張勇係左都督太子太保奉特旨授為靖逆侯今無級可加應準紀功一次至投送逆書二人該將軍既稱係逆賊勒害良民無奈前來投遞等語應聽該將軍酌量發落可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為請補營將以資征勦事準寧夏鎮今升提督臣陳福移咨到臣該臣查得中衛副將賈從哲業經正法鎮標右營遊擊柯彩巳經題補定邊副將所遺員缺值兹地方多事之際萬難久懸今準提臣以原任花馬池副將賴塔屢立戰功人地相宜擬補中衛營副將以隨征原任京口鎮標左營遊擊劉伯玉立功八次並援俞旨請還原職補用右營遊擊等因查賴塔經臣前咨督臣哈占擬補慶陽副將後準督臣咨移俟慶陽招撫另行題補在案此缺尚懸但中衛副將并鎮標遊擊二缺俱係緊要不便乏人今查賴塔劉伯玉才能軼衆歷著戰功以之補用前缺似為允當者也臣謹會同督臣哈占甘寧撫臣華善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十四年十一月二十五日題奉旨兵部知道欽此查該將軍侯正在征勦用人之際均應如其所題所有伊等功次俟議敘之日扣除可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為稟報陳亡官員事康熙十四年十二月十四日據防守張義堡領旗郭恩王居位報稱千總范洪勳奉遣領兵一百名防守張義堡於本月初十日未時忽來賊兵馬步數百名竟赴堡搶掠人民千總范洪勳率所部目兵暗出城門奮力當先從中截殺不意身帶重傷不能對敵説爾等可奮力撲殺勿以我為念恐致失機不便小的等遂一鼓前進將賊殺退追趕十餘里于酉時收兵陳斬賊二十七名我兵帶傷九名而范千總已經絶氣看所傷之處前胸左中鉛右臂中箭理合具報等情據此除臣一面另委官員前去固守城池外查得張義堡離固原八十餘里為靜寧州要地因固原逆賊鴟張臣遣發標下左營千總范洪勳帶領馬兵一百名防守堵禦不意逆賊來犯范洪勳奮不顧身當先堵殺以致重傷陳亡殊為可憫除所遺員缺遴選咨部補用外緣係營辨殺賊陳亡相應援請廕恤以慰忠魂以鼓後效者也臣謹會同甘寧撫臣華善合詞具題伏乞皇上睿鑒勑部議覆施行康熙十四年十二月二十一日題奉旨據奏千總范洪勳奮勇殺賊陳亡可憫作何恩恤著議奏該部知道欽此查定例內陳亡武職官員四品職任以下者準廕子弟一人以衛千總推用給恤銀一百五十兩等語陳亡千總范洪勳應準廕子弟一人以衛千總推用仍照例給與恤銀可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為飛報勦撫逆賊事康熙十四年十二月二十五日據撫標左營遊擊嶽鎮邦塘報內稱竊照卑職因逆賊在于水落城侵犯靜寧地方民被屠害業經呈報隨蒙飭令卑職率兵進勦卑職遵奉同爵標千總羅天夀等領兵千餘前進及抵賊境而逆賊統馬步賊兵二千餘前來迎敵卑職將兵分為二陳各率領從左右兩路奮力鏖戰賊遂披靡敗遁被我官兵陳斬偽副將一員守千把官八員殺死賊兵五百餘名活捉賊兵一百一十五名餘賊四散內有偽副將雒世仲偽遊擊李必捷等自知已無生路隨帶領見在賊兵二百四十三名投誠併被賊所掠民人婦女一百二十三名口俱查明釋放訖奪獲盔甲馬匹弓箭腰刀火器等項無數在事有功人員俟查明另報等情到臣據此該臣看得靜寧所屬之水落城離固原一百二十五里離平涼二百餘里此兩處逆賊利靜寧為通渭莊浪各州縣糧道故每遣賊兵欲行襲取搬運糧料以濟兵食臣等業已遣發遊擊嶽鎮邦帶兵千餘固守猶恐兵力單薄又調臨洮遊擊謝世忠河營守備林時泰率兵前赴協防續據嶽鎮邦稟報逆賊鴟張臣等隨飭該遊擊率同千總羅天夀等督兵進勦留遊擊謝世忠等防守城池乃嶽鎮邦等果能奮力效謀勦撫逆賊奪獲器械查釋難民厥功誠為𢡟著者也兹據塘報前來理合題報伏乞皇上睿鑒敕部議覆施行康熙十四年十二月二十八日題奉旨據奏嶽鎮邦等奮力效謀勦撫逆賊可嘉事平之日議敘具奏兵部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為欽奉上諭事準兵部咨開康熙十五年正月初四日奉上諭前將軍侯張勇具題請將天津總兵官趙良棟發往陜西彼時因陜西事體尚緩天津當海口要地故未發去今寧夏有事趙良棟陜西如有用處將軍張勇或調去應用或不必調往陜西之處令其作速密行具奏欽此備咨到臣同日又準兵部咨為兵丁鼓噪事內開寧夏係三邊要地關係重大應請敕下靖逆將軍侯張勇巡撫華善遴選忠貞賢能之員補授寧夏總兵官令其速赴安撫官兵之心綏定地方仍令將軍巡撫公同商議如鞏昌等處無有妨礙可以分往將軍巡撫二人內擬一人前往寧夏安撫官兵再回若將軍巡撫斷不可離鞏則不必去將寧夏情形打探的確不時題報其西寧總兵官王進寶已補提督所遺員缺或應推補或令王進寶以提督兼管西寧總兵官事聽將軍張勇巡撫華善酌議具題等因到臣竊照寧夏地當衝邊為秦省要區今值變故臣聞報之日慮官兵無有統紀民心驚惶又恐逆賊王輔臣遣發賊兵侵擾再布訛言則地方深為隱憂臣擬率兵赴彼撫綏軍民俟拉員外郎大兵抵固原仍回鞏昌今奉旨擬臣與撫臣分任臣愚以為必須臣親自前往庶為安妥除臣移會將軍佛尼勒甘撫臣華善西寧鎮臣王進寶令其嚴加防範固守秦州外臣擬于正月十二日統兵起行赴寧但寧鎮官兵見無總統急須賢能之員彈壓地方今奉旨令臣同撫臣遴選忠貞賢能之員速赴寧鎮又奉上諭趙良棟陜西如有用處將軍張勇或調去應用查天津總兵趙良棟向隨臣征勦所至歷有功績區畫每無遺䇿其韜鈐素裕逈有過人之才臣知最深故前題請調補寧夏總兵官今寧夏有事若得趙良棟控制甚為得人倘蒙俞允調補乞勑令由邊路兼程速赴任事俟臣抵寧安撫後如鞏秦有事臣仍回鞏如鞏秦無事臣同鎮臣趙良棟相機進勦平固庶期妖氛立靖耳至于總兵官王進寶巳升提督所遺員缺暫停推補仍令暫管西寧總兵事俟事平再為推補可也臣謹會同甘撫臣華善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十五年正月十二日題奉旨將軍侯張勇為國籌畫周詳深為可嘉本內情節議政王貝勒大臣會同速議具奏欽此查平定陜西全省勦滅逆賊等項事宜一惟將軍侯張勇是賴今將軍侯張勇身在地方稔知賊冦情形地方緩急擬親赴寧夏撫綏軍民俟安撫料理後如鞏秦有事仍回鞏昌如鞏秦無事臣同鎮臣趙良棟相機進勦平固移會將軍佛尼勒巡撫華善提督王進寶令其固守秦州等語均應如其所題聽將軍速赴寧夏撫綏軍民並將進取平固之處相機速行至于天津總兵官趙良棟駐鎮海口要地深得兵民之心不宜令離天津但寧夏有事將軍侯張勇復稱趙良棟韜鈐素裕逈有過人之才臣知最深請調補寧夏總兵官等語且寧夏係三邊要地所關甚為重大合宜重其職任應以此缺改為提督員缺將趙良棟升為寧夏提督令其速赴寧夏聽將軍總督節制印信禮部速為鑄給敕書內閣撰給其西寧總兵官員缺既稱暫停推補仍令王進寶管理事平再行推補亦應如所題至提督陳福自逆賊吳三桂反叛以來屢次勦殺逆賊建立功勳固守地方頗有勤勞為國忘家竭盡心力忠誠顯著今忽遭變身沒相應將伊弟涿州參將陳竒優升天津總兵官以酬忠勤命下之日內閣撰給敕書可也奉旨趙良棟升補寧夏提督總兵官陳竒升補天津總兵官餘俱依議速行靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為欽奉上諭事竊照寧鎮告變臣慮地方叵測一面移會將軍臣佛尼勒鎮臣王進寶撤兵回秦固守秦州一面檄撤臣標兵馬擬于正月十二日起程帶領赴寧安撫軍民業經題報外不意於十二日忽接定西大將軍多羅貝勒照會內開本年正月初六日平涼城內投出猓猓一名阿丕供稱初四日晚間平涼城內逆賊出兵發往秦州問其數目供稱不知多少合行移會預為防範等因到臣十三日又準提臣王進寶移會內稱逆賊王屏藩領兵欲從吳寨出犯臣思逆賊吳之茂見拒守西和離秦僅二百里王屏藩離秦亦不過二百餘里秦州兵力單薄倘臣一離斯地賊兵乘虛入犯深為可虞臣遂移會將軍佛尼勒提臣王進寶公議均謂臣萬不可輕離秦鞏臣思寧夏要地必須大臣前去遂議令提臣王進寶量帶精兵三千名前赴寧夏彈壓地方遂統寧鎮官兵會合副都統大兵相機進勦平固逆賊臣與將軍佛尼勒固守秦州但提臣一去而將軍佛尼勒滿兵無幾臣標見兵亦復寥寥況鞏昌兵馬又少不無乘機竊發之慮伏乞敕下定西大將軍將甘肅鎮臣孫思克并所轄標兵撤回駐守鞏昌又臣發往平涼標兵撤回秦州再撥滿洲甲兵千餘發秦州將軍統領庶能四應馳勦地方可保無虞矣再照提臣王進寶如赴寧夏而寧夏鎮務即令兼管似為妥便但西寧鎮缺亟須能員料理俟臣同撫臣華善公選賢能另疏請補外伏乞皇上睿鑒敕部議覆施行康熙十五年正月十六日題奉旨議政王大臣會同速議具奏欽此查將軍侯張勇既稱四川逆賊吳之茂等欲犯秦州又平涼城內逆賊發往秦州臣萬不可輕離秦鞏等語相應將提督王進寶不必發往寧夏令將軍侯張勇等合力固守秦鞏等處地方堵勦逆賊提督王進寶既停其前往寧夏其所請選補西寧總兵官員缺之處無庸議仍照將軍侯張勇前題令提督王進寶兼管可也奉旨依議速行靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為詳陳進勦逆賊機宜事竊照逆賊王輔臣負固平涼日久難下者原因賊糧道未斷平涼兵少圍困不敷又值寧夏有事恐賊愈為鴟張故臣前有赴寧夏之請繼因秦州兵少臣不敢離秦又有留秦之題今臣于本年正月十九日準兵部密咨一稟報事一緊急軍情事該議政王等會覆大將軍貝勒并臣題前事情由議得寧夏等處地方所關最要官兵作何安撫地方百姓作何綏輯一惟靖逆將軍侯是賴至攻取平涼在先尚候提督陳福之兵今提督陳福身巳如此若不速取平涼則秦省底定無日應聽將軍侯張勇等酌調官兵發去與大將軍貝勒等兵馬會合將併力克取平涼之處一面作速舉行一面奏聞奉旨移咨到臣但臣思各標兵馬除分防外見在單薄無兵可撥臣與將軍臣佛尼勒提督臣王進寶公議應照臣前題臣赴寧夏會合搯都統拉員外郎大兵相機夾勦平固留將軍臣提臣保守秦鞏但臣離秦州而將軍提督之兵又皆單薄伏乞敕下將西安就近兵馬無論何處調發防守各隘將各隘見在防守之兵撤回秦隴與將軍臣提臣之兵聫絡分防庶秦鞏可保無虞矣今擬臣于正月二十日統兵從秦州前赴寧夏所有撥防兵馬事宜伏乞皇上睿鑒敕部議覆施行康熙十五年正月十九日題奉旨速議具奏欽此會議得將軍侯張勇目擊地方緩急欲親赴寧夏會合大兵相機夾勦平固應如所題其速赴寧夏將克取固原平涼等處及勦滅逆賊事宜酌量而行仍將西安就近兵馬無論何處調撥照地方緩急速行撤回固守地方堵勦逆賊可也奉旨依議速行靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為遵旨酌行調遣并報抵鞏日期事竊臣因寧夏兵變逆賊乘隙侵犯臣一面具題一面于正月二十日自秦起程赴寧安撫行至鞏昌地方因見兵力單薄難資防禦隨留左營遊擊史孔筆帶標兵一千名駐鞏又前行至松山之龍灘河接準部文會議奉旨令臣駐劄適中地方四面調遣堵勦一惟聽臣酌行等因臣遂將先遣去遊擊安守正赴寧之兵撤回莊浪後又據中衛同知張輔報賊找筏欲行渡河飛請援兵等情臣隨遣前營守備張士竒帶標兵五百名前去中衛防守但臣奉有駐劄適中之旨因思蘭州路處四通可以居中調遣遂率兵回蘭乃屢據報川逆逼近秦鞏臣因營馬馳驅日久瘦損者多復于各營中挑選堪騎良馬一千匹令右營遊擊張文星前營遊擊安守正率標兵一千赴秦堵勦又將調來各營兵丁一千名令嘉峪關遊擊劉大明山丹遊擊邊永昌在蘭臨等處防守此臣節次酌行調遣之大略也計臣標兵除發平涼一千二百名留鞏一千名赴中衛五百名赴秦州一千名以及留甘患病帶傷安塘外現在隨臣兵馬僅有八百名乃係挑餘弱兵選剩疲馬悉不堪用正在苦心籌畫間于二月二十五日復準部文會議奉旨著臣前赴鞏昌等因臣于本月三十日親赴鞏昌外所有酌行調遣緣由並赴鞏昌日期理合一併題報伏乞皇上睿鑒敕部議覆施行康熙十五年二月二十九日題奉旨兵部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為塘報殺敗逆賊事康熙十五年三月初十日據臣標前營遊擊安守正撫標右營遊擊劉廷棟等塘報稱本月初九日天明時候據南山架梁兵丁報稱有賊二千餘名出南山沙溝等情卑職等隨即上城瞭望果有逆賊二千餘俱帶紅盔纓將伏羌四門圍繞卑職等公議領兵從北東二門衝殺北門係遊擊安守正邊永昌等領兵衝出東門係參將吕天玉遊擊劉廷棟等領兵衝出兩路勦殺逆賊大敗卑職隨即追勦至駱駝巷餘賊鳥散俱巳逺遁卑職等至未時收兵查殺死賊兵無數活捉偽參遊都守千把等二十餘名搜獲偽劄二十餘張活捉逆賊一百餘名內有中傷者就於關子鎮正法訖其餘六十餘名另行押解軍前所有奪獲馬匹盔甲器械等項數目俟查明另報等情到臣據此該臣看得自逆賊入犯秦鞏以來臣撤兵回蘭因賊勢日熾擬即統師赴援奈箭瘡痛楚痰火暈迷肩輿所至日僅三十里輾轉長途不能速援因思伏羌為秦鞏要路恐賊襲取不可不預為之防業巳先遣臣標前營遊擊安守正山丹遊擊邊永昌協同撫標遊擊劉廷棟安逺參將吕天玉等各帶兵駐防保守城池以堵逆氛去後乃逆賊果乘夜前來掩取以斷我秦州糧道時遊擊安守正劉廷棟等隄備素密分布有方身先士卒合力擊勦擒斬偽官賊兵奪獲馬匹盔甲器械等項餘賊逺遁大獲全勝皆仰賴我皇上天威逺播之所致也緣係殺敗逆賊理合具題伏乞皇上睿鑒敕部議覆施行康熙十五年三月初十日題奉旨覽卿奏遣發遊擊安守正等於伏羌縣城外擊敗賊衆擒斬偽官賊兵甚多得獲馬匹器械等項具見調度有方將士奮勇可嘉在事有功人員事平之日議敘具奏兵部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為委員監造軍器并請移駐地方事康熙十五年三月二十五日準兵部密咨為就便製造盔甲軍器等事會覆靖逆將軍侯張勇題前事等因奉旨議政王貝勒大臣會同速議具奏欽此該臣等議得前因將軍侯張勇赴寧故四川逆賊齊犯關係甚為重大相應令將軍侯張勇暫回鞏昌整頓兵馬會同大將軍勦滅逆賊其盔甲器械乃係緊要軍需聽將軍侯張勇選委才能官員差赴蘭州速行製造以濟軍需等因移咨到臣該臣查得製造盔甲軍器等項乃征勦防禦之所必需臣先奉有駐劄適中要地之旨因蘭州路處四通可以暫為駐劄又因該地匠物甚便故于本年二月內有移駐就便製造之請也但目今逆賊逼近秦鞏豈臣可逸坐蘭州製造軍器之時當即進兵于二月三十日離蘭三月初四日到鞏已經報明在案又于本月二十一日前抵伏羌因賊氛未靖極力分布以備䇿應計兩旬之內肩輿代騎載道督兵靡有寧晷緣盔甲軍器等項關係軍需最急又不敢視為可緩之事業已遵旨委官赴蘭監造外但臣提督衙門原係新設逺在甘州似難遙控萬一接應莫及不無貽誤封疆之慮或移駐蘭州或議駐何地臣未敢擅便相應題請伏乞皇上睿鑒仍敕部議覆施行康熙十五年三月二十七日題奉旨議政王貝勒大臣會議具奏欽此查平定秦省征勦逆賊悉皆付託將軍侯張勇今甘肅提督衙門或移于蘭州或駐何地聽將軍侯張勇酌量要地駐劄仍將駐劄處所報明該部可也奉旨依議靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹密題為塘報殺敗逆賊事竊臣于康熙十五年三月二十七日據駐防寧逺縣撫標右營遊擊劉廷棟報稱馬塢偽汪總兵因將軍前往伏羌帶兵數千來犯寧逺查寧逺為鞏昌要道兵力單薄請乞速發大兵前來保守城池等情到臣臣隨遣臣標後營遊擊劉虎守備邵廷臣并檄撫標右營遊擊劉廷棟同滿洲嘎喇昻邦纛章京傑印領滿漢官兵三千名前往馬塢鎮迎勦去後今于本年四月初一日據遊擊劉虎劉廷棟等塘報稱卑職等奉令統領官兵同滿洲章京等帶領滿兵前赴馬塢鎮會勦遵于二十八日至陳家窯劄營二十九日寅時起營行至平頭山遇賊馬步千餘列隊迎敵卑職等同滿洲章京督令官兵奮力撲勦逆賊敗遁下山卑職等分兵三路前進滿洲嘎喇昻邦章京等統領滿兵分為一路卑職虎帶領本標中營千把總韓成趙邦俊等分為一路撫標右營遊擊劉廷棟領守備邵廷臣千總冶大年等各官兵分為一路一齊追趕至山下逆賊大敗奔逃馬摀鎮卑職等奮力追殺至城下賊兵􅍆命入堡我兵周圍攻勦連攻三陳砍去鹿角柞攻開賊寨二座殺死賊兵千餘得獲賊糧三百四十餘袋陳斬偽都守等四員活捉逆賊四十三名其餘逆賊敗入老寨固守不出奪獲馬匹旗幟盔甲鳥鎗片刀賞給有功人員等情塘報到臣據此該臣看得馬塢當伏羌之後又附近鞏昌逆賊出犯寧逺無非欲邀我後故臣等會檄滿漢官兵前去迎勦今據報稱分路夾勦奮力攻開賊寨擒斬逆賊官兵一千四十餘員名得獲賊糧三百四十餘袋陳獲盔甲馬匹等項俱賞有功人員等情前來是皆仰賴我皇上威福并諸將士同心用命之所致也臣謹會同將軍臣佛尼勒撫臣華善提臣王進寶合詞具題伏乞皇上睿鑒敕部議覆施行康熙十五年四月初四日題奉旨覽卿奏會同纛章京傑印遣發滿漢官兵于馬塢等處地方擊敗賊衆擒斬甚多陳斬偽都司等得獲旗幟器械等項具見調度有方將士奮勇可嘉在事有功人員著議敘具奏兵部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為舉首逆書事康熙十五年四月初三日據署西安州遊擊賀雙龍塘報到臣據此該臣看得賀雙龍以革職遊擊隨軍征勦渡河以來屢立戰功經臣題請復職業蒙俞允在案續臣以西安州乃靖逺屏藩逼近固原夙稱衝要之地因稔知本官才堪重任遂委令署理本州營務以覘其能查該州被賊陳彭等屢次侵冦蹂躪巳極顛連凋敝之狀不堪矚目本官自署事以來加意撫綏保固巖疆種種整飭靡有懈弛所著成效亦已有明驗矣嗣因逆賊李黃鷹等大率賊衆直逼城下本官復能以微兵堵禦誓與城為存亡隨機應變拒守無虞不獨其才足用而其操守之堅更足以砥礪將士也且逆黨節次煽惑非啖之以利則危之以詞甚至以李成芳偽書相誘本官侃侃拒絶即行舉首誠所謂疾風中之徑草者矣夫既以練達之才而抒其謀猷復以忠貞之守而凛其節操則雙龍之才節似難泯沒不敘況當兹偽言散布在在鼓簧尤宜亟為表揚以激勸人心者也今據前由除將逆書送部外臣謹會同撫臣華善合詞具題伏乞皇上睿鑒敕部議覆施行康熙十五年四月初六日題奉旨據奏署遊擊賀雙龍出首逆書忠貞可嘉著議奏該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹密題為飛報殺敗侵犯通渭逆賊事竊照康熙十五年四月十六日據駐防通渭水泉守備段為章知縣周玉田稟據哨探兵丁稟稱探得偽總兵四人率衆萬餘塵土蔽天將抵縣城等情卑職查本縣城內僅有防守步兵二百名今聞逆賊大衆來犯百姓驚惶盡皆出城逃竄兵少城空萬難死守卑職等無奈暫駐山寨理合飛報乞速發大兵以救地方等情據此臣隨會參贊軍務護軍統領臣傑印令其率領滿兵同臣標副將劉選勝遊擊史孔筆安守正等帶領官兵于十七日自伏羌進發又移甘撫臣華善遣中軍遊擊嶽鎮邦同守備千把各官并臣標守備張士竒等率兵從鞏昌速赴通渭撲勦各去後本月十九日接護軍統領傑印報稱本統領會同貴標中軍劉副將等率領滿漢官兵前赴通渭途遇撫標遊擊嶽鎮邦等兵馬遂合兵前進行至十八盤坡遇見賊兵萬餘前來伏羌本統領會合劉副將等將滿漢官兵分為兩路左右夾擊奮力齊進賊不能支敗回通渭我兵尾追斬殺當時安遊擊同千總王友資等奪東門而入逆賊從城內逃出劉副將等又率兵從城外追殺正黃旗嘎喇昻邦同各章京率兵奪南門而入鑲白旗統領夸哈等各滿兵從城外追殺賊衆披靡敗奔上山計殺傷賊兵七百餘名活擒一百十四名得獲大炮四位馬匹駱駝器械等項賞給有功人員詢據拿獲賊兵供稱領兵係李總兵小李總兵陳總兵楊總兵供畢俱行正法訖官兵欲乘勝攻勦因天色已晚次日復會同各將領率滿漢官兵進攻三次奈賊已劄定營盤立有木柵挨牌布列火器難以攻取遂收兵對面安營等因又據副將劉選勝等塘報同前等情到臣該臣看得逆賊狂逞率衆萬餘侵犯通渭欲合川逆以連聲勢臣隨一面移會甘撫一面發兵撲勦今據塘報將士奮力用命擒斬八百餘名仍復縣城逆賊敗踞山頭我兵亦經安營等緣由雖一時未即蕩滅根株然亦足以破賊之膽矣但我兵尚與賊營相持兵力單薄臣處又無多兵可撥恐分禦不敷非計之得隨飛移將軍臣佛尼勒提臣王進寶從秦撥發滿兵五百名緑旗五百名俱到通渭會兵勦禦外臣謹會同將軍臣佛尼勒撫臣華善提臣王進寶合詞題報伏乞皇上睿鑒施行康熙十五年四月二十一日題奉旨據奏逆賊侵犯通渭護軍統領傑印等率領官兵殺敗賊衆得獲炮銃器械等項恢復縣城具見調度有方將士奮勇可嘉在事有功人員事平之日議敘具奏該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹密題為飛報大敗逆賊事康熙十五年四月二十四日據副將劉選勝遊擊史孔筆嶽鎮邦李守魁塘報稱前滿兵撤回伏羌卑職等奉有固守城池嚴禦逆賊勿令竊赴秦川之令遵即入城防守外于二十二日辰時望見北山各賊營旗幟亂動卑職等一面整兵一面公議如賊東向赴秦則亟行堵勦如賊欲挑戰則留副將劉選勝率領官兵守城卑職等分頭迎敵正商議間乃見賊奔突下山內有偽總兵李黃鷹李建基等率領馬步賊兵五千餘名從西面偽陳總兵率領馬步賊兵三千餘名從東面俱皆直擁前來卑職等隨照前議留守城池外遊擊史孔筆帶領守備千把各官率兵從南門出城嶽鎮邦帶領千把等官率兵從西門出城李守魁帶領千把各官率兵從東門出城逆賊見我官兵出城隨行站隊三路官兵分頭向前奮力撲勦賊死拒不退從辰至未鏖戰數陳賊始潰敗我兵隨後追勦逆賊仍上北山當陳活擒偽官并兵五十餘名內帶傷偽守備二名偽千總四名偽把總五名搜獲偽劄十一張在陳殺死賊兵五百餘名內殺死偽把總二名搜獲偽劄二張問據擒獲偽官等供稱吳之茂王屏藩屢遣人往平涼王輔臣處請兵前來秦州接應今此一陳若能取勝川賊必來平涼等語問畢俱經正法訖計奪獲棉甲火器旗幟器械等項俱經賞給有功人員除行間立功官兵及帶傷陳亡兵丁馬匹俟查明另行造册呈報外所有殺敗逆賊情形并獲偽劄合先飛報等情到臣據此該臣看得逆賊前犯通渭巳被滿漢官兵殺敗退據北山嗣據寧逺遊擊劉廷棟等報稱馬塢逆賊有出犯截餉之信臣因伏羌兵單遂移撤滿兵回伏仍檄催李守魁速赴通渭同劉選勝史孔筆嶽鎮邦等固守嚴防乃賊探知撤兵遂來侵犯縣城經臣標副將劉選勝調度議令遊擊史孔筆撫標遊擊嶽鎮邦西寧鎮標遊擊李守魁各率守備千把等官領兵分路夾勦自辰至未鏖戰良久賴官兵奮勇直進賊始潰敗奔回上山當陳擒斬逆賊官兵五百餘名共搜獲偽劄一十三張除偽官巳經正法盔甲器械旗幟火器等項賞給有功人員所獲偽劄咨送兵部查燬外臣謹會同將軍臣佛尼勒提臣王進寶合詞題報伏乞皇上睿鑒敕部議覆施行康熙十五年四月二十六日題奉旨覽卿奏遣發官兵於通渭縣地方擊敗賊衆擒斬甚多得獲偽劄器械等項具見調度有方將士奮勇可嘉在事有功人員著議敘具奏該部知道靖逆侯靖逆將軍兼管甘肅提督事務臣張勇謹題為衝鋒拔險大敗逆賊飛報捷音事竊臣前準撫臣華善咨報偽李將軍有入犯岷州之信臣以岷州逼近臨鞏恐被逆賊盤踞擬于二十四日親赴彈壓因撫逺大將軍以樂門賊勢猖獗恐臣分兵往鞏莫資䇿應臣遂留臣標中軍副將劉選勝防守伏羌臣于二十四日帶兵到樂門會同都統臣巡察地形查賊札營一十一座相為聫絡其南北山梁賊營二座相距都統營盤僅有三里許賊思踞險連營以圍困我兵非大挫其鋒使之喪膽恐蔓延日久則牢不可破矣臣等公議須安營于賊營山梁中間以分其勢併大舉精鋭拔其南北二營使賊失其險然後用勦用撫勢如破竹也隨議將滿兵分為二股一股攻賊南營即以一股堵其援南之兵臣標官兵亦分二股一股攻賊北營即以一股堵其援北之兵并令滿漢各兵每一兵帶草一束以備填塞賊營壕塹之用計議已定于二十六日黎明都統臣遣發鑲黃旗夸蘭大佛爾禾率領外委嘎巴什章京等滿洲官兵望賊南營進勦臣亦遣發前營遊擊安守正率領守備李𢎞鑒張士竒外委守備王𢎞鼎等各官兵望賊北營進勦二營逆賊布列鳥鎗齊出拒敵我兵奮力撲殺賊隨敗遁入營至已時樂門偽汪總兵率兵三千餘從北路前來偽李將軍率兵三千餘從南路前來分援南北二營不知臣等前議已遣鑲黃旗夸蘭大蘇尼安等領兵在河灘架梁預堵南來援兵復遣左營遊擊史孔筆後營遊擊劉虎等領兵屯札山梁預堵北來援兵故汪李二賊衝突數陳被我滿漢官兵分頭堵截鎗炮齊發賊遂敗奔不能進援而我進勦南北二營官兵仍復兩路攻擊鏖戰六陳奈三道壕塹加以鹿角挨牌我兵難于速拔至酉時傳令將所帶草束填平賊濠當先八旗滿兵合力齊進攻拔逆賊南營隨後緑旗官兵合力齊進攻拔逆賊北營二營既拔賊衆大潰東逃西竄各自奔命我兵尾殺因天黑不便逺追遂收兵回營活捉賊兵三百餘名訊供北營偽總兵官姓裴不知其名先被炮傷身死南營偽總兵姓白亦不知其名落崖跌死至次日天明查殺賊衆併跌崖死者計有千餘奪獲鹿角柞二千餘個挨牌一千六百餘面帳房六百餘頂併跌傷盔甲器械甚多當即給賞有功人員是役也皆仰賴我皇上威福而將士用命故能衝鋒拔險大獲全勝其餘釜息行見膽落魂消不敢狂逞矣所有傷亡滿漢官兵併倒斃馬匹俟查明造册另報外再照甘撫臣華善布政司伊圗因臣等兵馬急需糧芻特遣莊浪監收同知髙成美隨臣軍前招買并遣河州監收同知鄒玗伏羌縣知縣張其捷西河縣知縣馮翼鼎原任隴西縣知縣張琦買運䇿應俾滿漢兵食馬料不至告匱其勤勞亦難泯沒相應一併題報伏乞皇上睿鑒敕部議覆施行康熙十五年四月二十八日題奉旨覽卿奏親率滿漢官兵于樂門等處地方分路進勦攻破南北賊營擊敗來援賊衆擒斬偽總兵等得獲器械等項具見籌畫周詳調度有方將士奮勇可嘉在事有功人員著議敘具奏靖逆侯靖逆將軍少保仍兼太子太保兼管甘肅提督事務臣張勇謹奏為恭謝天恩事康熙十五年六月十八日準兵部咨為逐出海彛等事奉旨張勇著加少保兼太子太保欽此欽遵備咨到臣準此臣即恭設香案望闕叩頭謝恩訖竊臣猥以菲材謬膺重寄疊荷皇仁屢沐寵眷授以將軍既承節鉞之重錫以侯爵復叨帶礪之榮頒敕命於師中隆事權於閫外人臣遭遇之竒至此極矣乃以恢復河洮諸州復蒙特加少保之職夫公孤師保秩至崇也原以酬異績殊勛克建非常之業者臣徒以征討微勞濫受曠典感泣之餘實深惶悚擬欲具疏懇辭恐違成命致負天恩謹刻骨鏤心祗供厥職用殫犬馬之私以報髙厚之德者矣伏乞皇上睿鑒施行康熙十五年六月十九日奏奉旨該部知道靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹題為夾勦逆賊大獲全勝事竊照川逆盤踞樂門連營一十九座臣慮兵力單薄勦禦不敷隨飛咨陜西提臣王進寶移兵前來以壯聲援於六月十九日提臣帶兵前至樂門札營大河北岸以衛糧道詎賊乘提臣壁壘未定欲為劫營之計大率馬兵三千餘衆同步賊相繼渡河直望提臣營中衝突而來當經提臣遣發本標右營遊擊李守魁率領千總李日榮把總王和善等首先迎敵去後并親督前營遊擊郝善永泰遊擊趙光榮等官兵前進飛騎報臣臣令其從河北往南迎勦臣隨一面留臣標中軍副將劉選勝固守營盤一面撥發左營遊擊史孔筆前營遊擊安守正後營遊擊劉虎金塔寺遊擊李進江山丹營遊擊邊永昌各領守備千把等官兵從河南往北迎勦與遊擊郝善等所帶往南一股官兵共作環圍之勢併會都統臣黑葉副都統臣奚福率領各旗滿兵從中截擊臣亦從後督陳滿漢官兵奮力齊進分頭夾擊四面圍勦逆賊面面受敵左衝右突力不能支遂披靡大潰被箭傷刀砍者尸橫遍野投河落崖者不計其數生擒偽總兵張興偽副將雒世伸偽遊擊張承耀等并獲偽劄四張活捉精健蟒甲賊兵一百三十八名俱即正法訖并於陳斬尸內搜獲參遊守千把等偽官劄付三十一張與生擒偽官劄付共五十六張奪獲馬匹盔甲器械當即給賞有功人員是役也皆仰仗皇上威福而將士用命所致從此餘逆望風落膽不敢狂逞而蕩平疆土亦勢如破竹矣但查西寧鎮標後營千總王之福因撲入賊隊奮往直前頭中片刀當陳身殞深為可憫似應優恤以慰忠魂所有行間有功官員及傷亡官兵倒斃馬匹俟查明造册另報并將偽劄咨送兵部外臣謹會同提臣王進寶合詞具題伏乞皇上睿鑒敕部議覆施行康熙十五年六月二十二日題奉旨覽卿奏會同都統黑葉等率領滿漢官兵于樂門地方擊敗賊衆擒斬甚多活擒偽總兵副將等得獲偽劄馬匹器械等項具見調度有方將士奮勇可嘉在事有功人員著議敘具奏王之福作何恩恤著議奏兵部知道欽此查樂門節次殺賊功績現今行令靖逆將軍侯張勇等造册應俟各案有功官員清册送到之日一并彚敘至傷亡兵丁應聽該將軍酌量賞恤陳亡千總王之福係功加署守備應照現任職銜議敘廕子弟一人以衛千總推用恤銀一百五十兩可也奉旨依議靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹題為塘報大敗逆賊事康熙十五年七月初三日據領兵遊守桂奇李進江等報稱于七月初一日奉令領兵前到岷州岩昌地方準各土官報稱逆賊有五千餘衆聞知將軍遣發大兵前來即于二十八日移兵前去梨川等由卑職等隨會同遊擊劉大明栁開甲領兵前往追勦行至哈塔鋪見賊兵數百出沒其間卑職等率兵撲勦殺死賊兵數十名活擒六名問據供稱賊在梨川地方川裏下營等語卑職等遂直趨梨川果見賊營三座隨分兵三路合力進勦爵標左營守備桂奇遊擊李進江等帶領鞏營千把總各官兵分為中路嘉峪關遊擊劉大明西寧鎮標守備栁開甲帶領嘉峪關各官兵分為左路山丹營遊擊邊永昌等帶山丹營各官兵分為右路共三路齊進奮力撲勦連殺數陳逆賊大敗陳斬千餘名中傷者更多活捉七十二名餘賊逃匿山林因山路崎嶇松林深邃難以尾追遂公同收兵回營所有奪獲馬匹盔甲鳥鎗長鎗弓箭腰刀等項并傷亡官兵馬匹俟查明另報等情到臣該臣看得逆賊盤踞岩昌官軍對壘相持因偽將軍李良柱率賊冦犯岷州臣亟親統官兵赴岷援勦于本月二十九日到新寺鎮據塘報偽李將軍亦到岩昌各土官番族被賊迫脅每日數次請兵救援臣因瘡病之餘天氣暑熱晝夜行間一時昏暈兼以山路狹隘遽難前進遂遣左營守備桂奇遊擊李進江邊永昌守備邵廷臣等率兵兼程前進援勦去後續于七月初二日到漳縣據遊擊李進江等塘報追賊至梨川大敗賊衆得獲器械帳房甚多此雖將士協力效命實仰賴皇上天威逺播之所致也除將得獲器械等項檄令賞給有功人員及陳亡兵丁馬匹俟查明另報外事關殺敗逆賊理合題報伏乞皇上睿鑒敕部議覆施行康熙十五年七月初三日題奉旨覽卿奏遣發官兵于梨川地方殺敗賊衆得獲器械等項具見調度有方將士奮勇可嘉在事有功人員著議敘具奏兵部知道靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹奏為微臣病勢日危恐誤邊疆重任懇乞亟簡賢能以資彈壓事臣自本年二月內奉旨赴寧因痰火病發精神昏亂唯以安撫地方事屬重大乃肩輿就道星夜奔馳于三月初一日行至中途忽自顛仆幾不能蘇及抵鞏昌藥餌調治稍有起色又飛赴伏羌樂門等處扶病勦賊奈箭毒久傷元氣耗散不過兩三日內即發暈數次兼以腿瘡纒綿不時腫痛遍體麻木舉動艱難此臣近來病勢危篤之狀滿漢官兵所共目擊者也伏念臣蒙世祖章皇帝拔于儔類之中復荷皇上寄以腹心之重計受兩朝知遇之恩于兹三十有餘載矣其間寵眷之日隆賞賚之獨厚不一而足臣思天地之愛物靡所不周父母之愛子無所不至今皇上之待臣如此亦即天地父母也臣豈土木為心而有不思忘身家捐頂踵以仰答髙厚于萬一而顧以病篤之故屢疏乞休者非為疾痛莫支自圗安逸之計亦非性命念重欲為靜攝之謀而臣之所以力辭解任者實為封疆起見也蓋甘肅為三秦門户提督為三鎮綱維當兹亂臣內叛海彛外伺之時即以強幹精明者分符坐鎮猶慮區畫偶踈有乖布置況以病臣竊位其中萬一所在告警非臣瘡腫難行之日即臣痰壅暈迷之際師無所統則兵不用命必致倉皇失措策應莫及斯時也臣雖虀粉恐不足以贖其辜矣若夫裹尸還葬臣自筮仕以來即以此念自矢肝腦塗地正臣死得其所之時斷非以愛身之故而疊請休致也但臣前疏奏辭奉有不必以疾求罷之旨或者皇上察臣在邊日久頗諳情形故不以衰殘困憊而加擯斥然今日四海景從懷瑾握瑜足備干城之選者實繁有人如臣一息雖存奄奄待斃又何足補耶泣懇皇上俯念巖疆重地鑒臣病勢危篤迅簡賢能星馳代任準臣赴京醫治倘邀聖庇得延殘喘是臣之餘生皆賴我皇上之覆載也如委滇溝壑而邊圉得人獲保清晏臣亦瞑目于地下矣臣不勝惶悚待命之至謹具奏請旨康熙十五年七月初四日奏奉旨卿長才偉略久鎮巖疆矢志忠貞力圖報國勦禦賊冦恢復地方安輯兵民勞績茂著秦省軍務方殷正資料理著勉加調攝益殫壯猷以副朕倚任之意不必以疾求罷該部知道靖逆侯靖逆將軍少保仍兼太子太保管甘肅提督事務臣張勇謹密題為急請鎮臣統練新兵以資分防事竊照興安鎮屬官兵經臣題請照依原額召募業奉俞旨臣隨會同甘撫并甘西二鎮各行招募并馬匹招中牽領計自本年正月起至六月終止臣同撫鎮各臣共計募有馬步兵五千五百有竒但不便令其坐糜糧餉查今川賊敗遁各隘需兵應將所募之兵撥防分禦惟是新募之衆操演訓練必須禆員管轄方為有制之師故興鎮原設新增副參遊守等官臣與督臣遴選賢能隨才題補然三軍無司命之主勢必渙散而各將無總理之樞亦將懈怠是新募之兵與新補之將控制得當指臂相須者惟鎮臣是賴耳伏乞皇上簡選賢能擢授興安鎮庶兵馬得有統率用以分守各隘實有禆也再照應募興漢鎮屬之兵共計一萬五千有竒今地方尚未恢復一鎮似難率理況秦徽鳳隴各要地既恐外虞又慮伏莽必須分行彈壓防禦方周應將前裁補秦州總兵朱衣客并暫駐秦州漢中總兵費雅達俱令其速抵秦州分統新兵則訓練防禦均有攸賴矣至于平涼巳經歸誠則提臣王進寶應專管陜西提督事務其西寧原缺請祈睿鑒另簡賢員迅赴任事俾要地得人而巖疆永固也臣謹會同督臣哈占合詞具題伏乞皇上睿鑒敕部議覆施行康熙十五年七月十三日題奉旨議政王貝勒大臣會議具奏欽此查撫逺大將軍圗海題請令提督王進寶駐劄固原固原總兵朱衣客駐劄西寧管西鎮事等語臣等會議俱如大將軍所題此疏無庸另議至稱應募興漢鎮屬一萬五千有竒之兵一鎮似難率理等語今朱衣客已授西寧總兵其興漢鎮屬兵馬作何分轄之處聽靖逆將軍侯張勇總督哈占提督王進寶公同會商確議具題可也奉旨依議張襄壯奏疏卷四
